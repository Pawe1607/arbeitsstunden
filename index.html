<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Stundenheld">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/PJtc4Nz0/icon-arbeit.png">
    
    <title>Stundenheld Pro Glass</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #1d1d1f;
            --text-muted: #6e6e73;
            --primary: #007AFF;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --safe-top: env(safe-area-inset-top, 47px);
            
            --box-orange: #FF9500;
            --box-blue: #007AFF;
            --box-green: #34C759;
            --box-purple: #AF52DE;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-gradient: linear-gradient(135deg, #000000 0%, #1c1c1e 100%);
                --glass-bg: rgba(28, 28, 30, 0.75);
                --glass-border: rgba(255, 255, 255, 0.1);
                --text-main: #FFFFFF;
                --text-muted: #98989d;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-gradient); 
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-main); 
            padding-top: var(--safe-top); 
            padding-bottom: calc(160px + var(--safe-bottom)); 
        }

        .tab-content { display: none; padding: 20px; }
        .tab-content.active { 
            display: block; 
            animation: slideUp 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
        }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        h1 { font-size: 34px; font-weight: 800; margin-bottom: 10px; letter-spacing: -1px; padding-left: 4px; }
        
        .filter-container { margin-bottom: 30px; margin-top: 10px; } 

        .section-title { font-size: 13px; text-transform: uppercase; color: var(--text-muted); font-weight: 700; letter-spacing: 0.5px; margin: 45px 0 15px 4px; display: flex; align-items: center; gap: 8px; }
        .section-title::after { content: ""; height: 1px; background: var(--glass-border); flex-grow: 1; }

        /* Glass Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 22px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .stat-box { 
            padding: 18px; 
            border-radius: 20px; 
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .stat-box h3 { font-size: 10px; text-transform: uppercase; margin-bottom: 8px; font-weight: 700; color: var(--text-muted); }
        .stat-box p { font-size: 20px; font-weight: 800; }

        .stat-box.orange p { color: var(--box-orange); }
        .stat-box.blue p { color: var(--box-blue); }
        .stat-box.green p { color: var(--box-green); }
        .stat-box.purple p { color: var(--box-purple); }

        .input-group { margin-bottom: 20px; }
        label { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; font-weight: 700; display: block; padding-left: 4px; }
        
        select.ios-select, input {
            background: rgba(255,255,255,0.1); 
            color: var(--text-main); 
            font-size: 17px; 
            font-weight: 600; 
            padding: 14px;
            border-radius: 14px; 
            border: 1px solid var(--glass-border); 
            width: 100%; 
            appearance: none;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        button.primary-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 18px; 
            font-size: 17px; 
            font-weight: 700; 
            width: 100%; 
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
            transition: transform 0.1s;
        }
        button.primary-btn:active { transform: scale(0.97); }

        button.sec-btn { 
            background: var(--glass-border); 
            color: var(--text-main); 
            border: none; 
            padding: 14px; 
            border-radius: 14px; 
            font-size: 13px; 
            font-weight: 700; 
        }

        .tab-bar { 
            position: fixed; 
            bottom: calc(var(--safe-bottom) + 10px); 
            left: 20px; 
            right: 20px; 
            background: var(--glass-bg); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
            border-radius: 35px; 
            display: flex; 
            justify-content: space-around; 
            padding: 16px; 
            z-index: 1000; 
            border: 1px solid var(--glass-border); 
            box-shadow: 0 10px 40px rgba(0,0,0,0.15); 
        }
        .tab-item { flex: 1; text-align: center; color: var(--text-muted); font-size: 9px; font-weight: 700; display: flex; flex-direction: column; align-items: center; text-transform: uppercase; transition: color 0.3s; }
        .tab-item.active { color: var(--primary); }
        .tab-icon svg { width: 22px; height: 22px; margin-bottom: 5px; stroke-width: 2.3; transition: transform 0.3s; }
        .tab-item.active .tab-icon svg { transform: translateY(-2px); }

        .history-item, .preset-item { 
            background: transparent; 
            padding: 20px; 
            border-bottom: 1px solid var(--glass-border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .history-item:last-child { border-bottom: none; }

        .action-links { display: flex; gap: 15px; margin-top: 8px; justify-content: flex-end; }
        .delete-link { color: #FF3B30; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .edit-link { color: var(--primary); font-size: 11px; font-weight: 800; text-transform: uppercase; }

        canvas { max-width: 100% !important; }
    </style>
</head>
<body>

    <div id="tab-dashboard" class="tab-content active">
        <h1>Stundenheld</h1>
        <div class="filter-container">
            <select id="dashboard-month-filter" class="ios-select" onchange="updateDashboard()"></select>
        </div>
        
        <div class="section-title">Dein Monat</div>
        <div class="stats-grid">
            <div class="stat-box orange"><h3>Stunden</h3><p id="m-hours">0.00 h</p></div>
            <div class="stat-box blue"><h3>Lohn</h3><p id="m-wage">0 €</p></div>
            <div class="stat-box green"><h3>Trinkgeld</h3><p id="m-tip">0 €</p></div>
            <div class="stat-box purple"><h3>Schichten</h3><p id="m-shifts">0</p></div>
        </div>
        <div class="glass-card"><canvas id="monthChart"></canvas></div>
        
        <div class="section-title">All-Time Karriere</div>
        <div class="stats-grid">
            <div class="stat-box orange"><h3>Std Gesamt</h3><p id="a-hours">0.00 h</p></div>
            <div class="stat-box blue"><h3>Lohn Gesamt</h3><p id="a-wage">0 €</p></div>
            <div class="stat-box green"><h3>Tipp Gesamt</h3><p id="a-tip">0 €</p></div>
            <div class="stat-box purple"><h3>Schichten</h3><p id="a-shifts">0</p></div>
        </div>
        <div class="glass-card"><canvas id="allTimeChart"></canvas></div>
    </div>

    <div id="tab-add" class="tab-content">
        <h1>Eintragen</h1>
        <div class="glass-card">
            <div class="input-group">
                <label>Abrechnungs-Modus</label>
                <select id="entry-mode" class="ios-select" onchange="toggleEntryMode()">
                    <option value="normal">Normaler Arbeitstag</option>
                    <option value="pauschal">Event / Pauschal</option>
                </select>
            </div>
            <div id="preset-container" class="input-group">
                <label>Schnell-Vorlage wählen</label>
                <select id="preset-select" class="ios-select" onchange="applyPreset()">
                    <option value="">-- Keine Vorlage --</option>
                </select>
            </div>
            <div class="input-group"><label>Datum</label><input type="date" id="shift-date"></div>
            
            <div id="normal-fields">
                <div class="grid-2">
                    <div class="input-group"><label>Beginn</label><input type="time" id="time-start"></div>
                    <div class="input-group"><label>Ende</label><input type="time" id="time-end"></div>
                </div>
                <div class="grid-2">
                    <div class="input-group"><label>Pause (Min)</label><input type="number" id="shift-break" placeholder="30"></div>
                    <div class="input-group"><label>€ / Std</label><input type="number" id="hourly-wage" placeholder="13.50"></div>
                </div>
            </div>

            <div id="pauschal-fields" style="display:none;">
                <div class="input-group"><label>Pauschal-Betrag (€)</label><input type="number" id="flat-amount" placeholder="100"></div>
            </div>

            <div class="input-group"><label>Trinkgeld (€)</label><input type="number" id="shift-tip" placeholder="0"></div>
            <button class="primary-btn" onclick="saveShift()">EINTRAG SPEICHERN</button>
        </div>
    </div>

    <div id="tab-presets" class="tab-content">
        <h1>Tools</h1>
        <div class="section-title">Neue Vorlage</div>
        <div class="glass-card">
            <div class="input-group"><label>Name</label><input type="text" id="p-name" placeholder="z.B. Spätschicht"></div>
            <div class="grid-2">
                <div class="input-group"><label>Start</label><input type="time" id="p-start"></div>
                <div class="input-group"><label>Ende</label><input type="time" id="p-end"></div>
            </div>
            <div class="grid-2">
                <div class="input-group"><label>Pause</label><input type="number" id="p-break" placeholder="30"></div>
                <div class="input-group"><label>€/Std</label><input type="number" id="p-wage" placeholder="14"></div>
            </div>
            <button class="primary-btn" onclick="savePreset()">VORLAGE SPEICHERN</button>
        </div>
        
        <div id="preset-list" class="glass-card" style="padding:0; overflow:hidden;"></div>

        <div class="section-title">Datensicherung</div>
        <div class="glass-card">
            <div class="grid-2">
                <button class="sec-btn" onclick="exportData()">EXPORT</button>
                <button class="sec-btn" onclick="document.getElementById('importFile').click()">IMPORT</button>
            </div>
            <input type="file" id="importFile" style="display:none" onchange="importData(event)">
        </div>
    </div>

    <div id="tab-history" class="tab-content">
        <h1>Verlauf</h1>
        <div class="filter-container"><select id="history-month-filter" class="ios-select" onchange="renderHistory()"></select></div>
        <div id="history-list" class="glass-card" style="padding:0; overflow:hidden;"></div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab('dashboard', this)"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></span>Home</div>
        <div class="tab-item" onclick="switchTab('add', this)"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg></span>Neu</div>
        <div class="tab-item" onclick="switchTab('presets', this)"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg></span>Tools</div>
        <div class="tab-item" onclick="switchTab('history', this)"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"></path></svg></span>Liste</div>
    </div>

    <script>
        let shifts = JSON.parse(localStorage.getItem('myShifts')) || [];
        let presets = JSON.parse(localStorage.getItem('myPresets')) || [];
        let mChart = null, aChart = null;

        document.getElementById('shift-date').valueAsDate = new Date();
        updateMonthDropdowns(); updateDashboard(); renderPresets();

        function switchTab(t, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`tab-${t}`).classList.add('active');
            if(el) el.classList.add('active');
            if(t === 'dashboard') updateDashboard();
            if(t === 'history') renderHistory();
        }

        function toggleEntryMode() {
            const m = document.getElementById('entry-mode').value;
            document.getElementById('normal-fields').style.display = m === 'normal' ? 'block' : 'none';
            document.getElementById('pauschal-fields').style.display = m === 'pauschal' ? 'block' : 'none';
            document.getElementById('preset-container').style.display = m === 'normal' ? 'block' : 'none';
        }

        function saveShift() {
            const mode = document.getElementById('entry-mode').value;
            const date = document.getElementById('shift-date').value;
            const tip = parseFloat(document.getElementById('shift-tip').value) || 0;
            if(!date) return;
            let s = { id: Date.now(), date, tip, hours: 0, wageEarned: 0, type: mode };
            if(mode === 'normal') {
                const st = document.getElementById('time-start').value, en = document.getElementById('time-end').value;
                const wg = parseFloat(document.getElementById('hourly-wage').value) || 0, br = parseFloat(document.getElementById('shift-break').value) || 0;
                if(!st || !en) return;
                let sD = new Date(`1970-01-01T${st}`), eD = new Date(`1970-01-01T${en}`);
                if(eD < sD) eD.setDate(eD.getDate() + 1);
                s.hours = (eD - sD) / 3600000 - (br/60);
                s.wageEarned = s.hours * wg;
            } else { s.wageEarned = parseFloat(document.getElementById('flat-amount').value) || 0; }
            shifts.push(s); localStorage.setItem('myShifts', JSON.stringify(shifts));
            document.getElementById('shift-tip').value = ''; updateMonthDropdowns();
            switchTab('dashboard', document.querySelector('.tab-item'));
        }

        function editTip(id) {
            const s = shifts.find(x => x.id === id);
            if(s) {
                const n = prompt("Neues Trinkgeld (€):", s.tip);
                if(n !== null) { s.tip = parseFloat(n) || 0; localStorage.setItem('myShifts', JSON.stringify(shifts)); renderHistory(); updateDashboard(); }
            }
        }

        function savePreset() {
            const n = document.getElementById('p-name').value; if(!n) return;
            presets.push({ id: Date.now(), name: n, start: document.getElementById('p-start').value, end: document.getElementById('p-end').value, break: document.getElementById('p-break').value, wage: document.getElementById('p-wage').value });
            localStorage.setItem('myPresets', JSON.stringify(presets)); renderPresets();
            document.getElementById('p-name').value = '';
        }

        function renderPresets() {
            document.getElementById('preset-list').innerHTML = presets.map(p => `<div class="preset-item"><div><strong>${p.name}</strong><br><small>${p.start}-${p.end} Uhr</small></div><span class="delete-link" onclick="deletePreset(${p.id})">Entfernen</span></div>`).join('');
            document.getElementById('preset-select').innerHTML = '<option value="">-- Keine Vorlage --</option>' + presets.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        }

        function applyPreset() {
            const p = presets.find(x => x.id == document.getElementById('preset-select').value);
            if(p) { document.getElementById('time-start').value=p.start; document.getElementById('time-end').value=p.end; document.getElementById('shift-break').value=p.break; document.getElementById('hourly-wage').value=p.wage; }
        }

        function deletePreset(id) { presets = presets.filter(p => p.id !== id); localStorage.setItem('myPresets', JSON.stringify(presets)); renderPresets(); }

        function updateMonthDropdowns() {
            const mths = [...new Set(shifts.map(s => s.date.substring(0, 7)))].sort().reverse();
            const d = document.getElementById('dashboard-month-filter'), h = document.getElementById('history-month-filter');
            let o = mths.map(m => `<option value="${m}">${m}</option>`).join('');
            d.innerHTML = o || `<option value="${new Date().toISOString().substring(0,7)}">${new Date().toISOString().substring(0,7)}</option>`;
            h.innerHTML = '<option value="all">Alle Monate</option>' + o;
        }

        function updateDashboard() {
            const sel = document.getElementById('dashboard-month-filter').value;
            const ms = shifts.filter(s => s.date.startsWith(sel));
            const mst = ms.reduce((a, s) => { a.h += s.hours; a.w += s.wageEarned; a.t += s.tip; return a; }, {h:0, w:0, t:0});
            document.getElementById('m-hours').innerText = mst.h.toFixed(2)+'h';
            document.getElementById('m-wage').innerText = mst.w.toFixed(2)+'€';
            document.getElementById('m-tip').innerText = mst.t.toFixed(2)+'€';
            document.getElementById('m-shifts').innerText = ms.length;

            const ast = shifts.reduce((a, s) => { a.h += s.hours; a.w += s.wageEarned; a.t += s.tip; return a; }, {h:0, w:0, t:0});
            document.getElementById('a-hours').innerText = ast.h.toFixed(2)+'h';
            document.getElementById('a-wage').innerText = ast.w.toFixed(2)+'€';
            document.getElementById('a-tip').innerText = ast.t.toFixed(2)+'€';
            document.getElementById('a-shifts').innerText = shifts.length;
            renderCharts(ms.sort((a,b) => a.date.localeCompare(b.date)));
        }

        function renderCharts(ms) {
            const ctxM = document.getElementById('monthChart').getContext('2d');
            if(mChart) mChart.destroy();
            mChart = new Chart(ctxM, { type: 'bar', data: { labels: ms.map(s => s.date.split('-')[2]), datasets: [{ label: '€', data: ms.map(s => s.wageEarned+s.tip), backgroundColor: '#007AFF', borderRadius: 8 }] }, options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } } });
            const ctxA = document.getElementById('allTimeChart').getContext('2d');
            if(aChart) aChart.destroy();
            const grp = shifts.reduce((acc, s) => { const m = s.date.substring(0, 7); acc[m] = (acc[m] || 0) + s.wageEarned + s.tip; return acc; }, {});
            const lbs = Object.keys(grp).sort();
            aChart = new Chart(ctxA, { type: 'bar', data: { labels: lbs, datasets: [{ data: lbs.map(l => grp[l]), backgroundColor: '#34C759', borderRadius: 8 }] }, options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } } });
        }

        function renderHistory() {
            const f = document.getElementById('history-month-filter').value;
            const res = f === 'all' ? shifts : shifts.filter(s => s.date.startsWith(f));
            document.getElementById('history-list').innerHTML = res.sort((a,b) => b.id - a.id).map(s => `
                <div class="history-item">
                    <div><strong>${new Date(s.date).toLocaleDateString('de-DE', {weekday:'short', day:'2-digit'})}</strong><br><small>${s.type==='pauschal'?'Event':s.hours.toFixed(2)+'h'} | Tipp: ${s.tip}€</small></div>
                    <div style="text-align:right"><strong>${(s.wageEarned+s.tip).toFixed(2)}€</strong><br>
                        <div class="action-links"><span class="edit-link" onclick="editTip(${s.id})">Tipp</span><span class="delete-link" onclick="deleteShift(${s.id})">X</span></div>
                    </div>
                </div>
            `).join('');
        }

        function deleteShift(id) { if(confirm('Löschen?')) { shifts = shifts.filter(s => s.id !== id); localStorage.setItem('myShifts', JSON.stringify(shifts)); renderHistory(); updateDashboard(); } }

        function exportData() {
            const data = { shifts, presets };
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `stundenheld_backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
        }

        function importData(event) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if(data.shifts) shifts = data.shifts;
                    if(data.presets) presets = data.presets;
                    localStorage.setItem('myShifts', JSON.stringify(shifts));
                    localStorage.setItem('myPresets', JSON.stringify(presets));
                    alert("Import erfolgreich!"); location.reload();
                } catch(err) { alert("Fehler!"); }
            };
            reader.readAsText(event.target.files[0]);
        }
    </script>
</body>
</html>
