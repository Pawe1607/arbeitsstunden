<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Stundenheld">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/PJtc4Nz0/icon-arbeit.png">
    
    <title>Stundenheld</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #000000;
            --text-muted: #8E8E93;
            --primary: #007AFF;
            --border-color: rgba(60, 60, 67, 0.1);
            --tab-bar-bg: rgba(255, 255, 255, 0.85);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --safe-top: env(safe-area-inset-top, 47px);
            
            --box-orange-bg: rgba(255, 149, 0, 0.12); --box-orange-txt: #FF9500;
            --box-blue-bg: rgba(0, 122, 255, 0.12); --box-blue-txt: #007AFF;
            --box-green-bg: rgba(52, 199, 89, 0.12); --box-green-txt: #34C759;
            --box-purple-bg: rgba(175, 82, 222, 0.12); --box-purple-txt: #AF52DE;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --card-bg: #1C1C1E;
                --text-main: #FFFFFF;
                --text-muted: #98989D;
                --border-color: rgba(235, 235, 245, 0.15);
                --tab-bar-bg: rgba(28, 28, 30, 0.85);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); padding-top: var(--safe-top); padding-bottom: calc(140px + var(--safe-bottom)); }

        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 34px; font-weight: 800; margin-bottom: 20px; letter-spacing: -1px; padding-left: 4px; }
        .filter-container { margin-bottom: 28px; } 
        .section-title { font-size: 13px; text-transform: uppercase; color: var(--text-muted); font-weight: 700; letter-spacing: 0.5px; margin: 35px 0 15px 4px; display: flex; align-items: center; gap: 8px; }
        .section-title::after { content: ""; height: 1px; background: var(--border-color); flex-grow: 1; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
        .stat-box { padding: 18px; border-radius: 22px; background: var(--card-bg); border: 1px solid var(--border-color); }
        .stat-box h3 { font-size: 10px; text-transform: uppercase; margin-bottom: 8px; font-weight: 700; color: var(--text-muted); }
        .stat-box p { font-size: 20px; font-weight: 800; }

        .card { background: var(--card-bg); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border-color); }
        
        .input-group { margin-bottom: 22px; }
        label { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; font-weight: 700; display: block; padding-left: 4px; }
        
        select.ios-select, input {
            background-color: var(--card-bg); color: var(--text-main); font-size: 17px; font-weight: 600; padding: 16px;
            border-radius: 14px; border: 1px solid var(--border-color); width: 100%; appearance: none; -webkit-appearance: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        select.ios-select {
            color: var(--primary);
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23007AFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat; background-position: right 16px top 50%; background-size: 12px auto;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button.primary-btn { background: var(--primary); color: white; border: none; padding: 20px; border-radius: 18px; font-size: 18px; font-weight: 700; width: 100%; box-shadow: 0 8px 20px rgba(0, 122, 255, 0.25); margin-top: 10px; }
        
        .tab-bar { position: fixed; bottom: calc(var(--safe-bottom) + 10px); left: 15px; right: 15px; background: var(--tab-bar-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-radius: 30px; display: flex; justify-content: space-around; padding: 12px; z-index: 1000; border: 0.5px solid rgba(255, 255, 255, 0.2); box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .tab-item { flex: 1; text-align: center; color: var(--text-muted); font-size: 9px; font-weight: 700; display: flex; flex-direction: column; align-items: center; text-transform: uppercase; }
        .tab-item.active { color: var(--primary); }
        .tab-icon svg { width: 22px; height: 22px; margin-bottom: 4px; stroke-width: 2.3; }

        .history-item, .preset-item { background: var(--card-bg); padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .action-links { display: flex; gap: 12px; margin-top: 8px; justify-content: flex-end; }
        .delete-link { color: #FF3B30; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .edit-link { color: var(--primary); font-size: 11px; font-weight: 700; text-transform: uppercase; }

        .stat-box.orange { background: var(--box-orange-bg); } .stat-box.orange p { color: var(--box-orange-txt); }
        .stat-box.blue { background: var(--box-blue-bg); } .stat-box.blue p { color: var(--box-blue-txt); }
        .stat-box.green { background: var(--box-green-bg); } .stat-box.green p { color: var(--box-green-txt); }
        .stat-box.purple { background: var(--box-purple-bg); } .stat-box.purple p { color: var(--box-purple-txt); }
    </style>
</head>
<body>

    <div id="tab-dashboard" class="tab-content active">
        <h1>Stundenheld</h1>
        <div class="section-title">Dein Monat</div>
        <div class="filter-container">
            <select id="dashboard-month-filter" class="ios-select" onchange="updateDashboard()"></select>
        </div>
        <div class="stats-grid">
            <div class="stat-box orange"><h3>Monat Stunden</h3><p id="m-hours">0.00 h</p></div>
            <div class="stat-box blue"><h3>Monat Lohn</h3><p id="m-wage">0 €</p></div>
            <div class="stat-box green"><h3>Monat Tipp</h3><p id="m-tip">0 €</p></div>
            <div class="stat-box purple"><h3>Schichten</h3><p id="m-shifts">0</p></div>
        </div>
        <div class="card"><canvas id="monthChart"></canvas></div>
        <div class="section-title">All-Time Karriere</div>
        <div class="stats-grid">
            <div class="stat-box orange"><h3>Gesamt Stunden</h3><p id="a-hours">0.00 h</p></div>
            <div class="stat-box blue"><h3>Gesamt Lohn</h3><p id="a-wage">0 €</p></div>
            <div class="stat-box green"><h3>Gesamt Tipp</h3><p id="a-tip">0 €</p></div>
            <div class="stat-box purple"><h3>Alle Schichten</h3><p id="a-shifts">0</p></div>
        </div>
        <div class="card"><canvas id="allTimeChart"></canvas></div>
    </div>

    <div id="tab-add" class="tab-content">
        <h1>Eintragen</h1>
        <div class="card">
            <div class="input-group">
                <label>Abrechnungs-Modus</label>
                <select id="entry-mode" class="ios-select" onchange="toggleEntryMode()">
                    <option value="normal">Normaler Arbeitstag</option>
                    <option value="pauschal">Event / Pauschal</option>
                </select>
            </div>

            <div id="preset-container" class="input-group">
                <label>Schnell-Vorlage wählen</label>
                <select id="preset-select" class="ios-select" onchange="applyPreset()">
                    <option value="">-- Keine Vorlage --</option>
                </select>
            </div>

            <div class="input-group">
                <label>Datum</label>
                <input type="date" id="shift-date">
            </div>

            <div id="normal-fields">
                <div class="grid-2">
                    <div class="input-group"><label>Beginn</label><input type="time" id="time-start"></div>
                    <div class="input-group"><label>Ende</label><input type="time" id="time-end"></div>
                </div>
                <div class="grid-2">
                    <div class="input-group"><label>Pause (Min)</label><input type="number" id="shift-break" placeholder="30"></div>
                    <div class="input-group"><label>€ / Std</label><input type="number" id="hourly-wage" placeholder="13.50"></div>
                </div>
            </div>

            <div id="pauschal-fields" style="display:none;">
                <div class="input-group">
                    <label>Pauschal-Betrag (€)</label>
                    <input type="number" id="flat-amount" placeholder="z.B. 100">
                </div>
            </div>

            <div class="input-group">
                <label>Trinkgeld (€)</label>
                <input type="number" id="shift-tip" placeholder="0">
            </div>
            <button class="primary-btn" onclick="saveShift()">EINTRAG SPEICHERN</button>
        </div>
    </div>

    <div id="tab-presets" class="tab-content">
        <h1>Vorlagen</h1>
        <div class="card">
            <div class="input-group"><label>Name</label><input type="text" id="p-name" placeholder="z.B. Frühschicht"></div>
            <div class="grid-2">
                <div class="input-group"><label>Start</label><input type="time" id="p-start"></div>
                <div class="input-group"><label>Ende</label><input type="time" id="p-end"></div>
            </div>
            <div class="grid-2">
                <div class="input-group"><label>Pause</label><input type="number" id="p-break" placeholder="30"></div>
                <div class="input-group"><label>€/Std</label><input type="number" id="p-wage" placeholder="14.00"></div>
            </div>
            <button class="primary-btn" onclick="savePreset()">VORLAGE SPEICHERN</button>
        </div>
        <div id="preset-list" style="border-radius:24px; overflow:hidden; background:var(--card-bg); border:1px solid var(--border-color);"></div>
    </div>

    <div id="tab-history" class="tab-content">
        <h1>Verlauf</h1>
        <div class="filter-container"><select id="history-month-filter" class="ios-select" onchange="renderHistory()"></select></div>
        <div id="history-list" style="border-radius:24px; overflow:hidden; background:var(--card-bg); border:1px solid var(--border-color);"></div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab('dashboard', this)"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></span>Home</div>
        <div class="tab-item" onclick="switchTab('add', this)"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg></span>Neu</div>
        <div class="tab-item" onclick="switchTab('presets', this)"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg></span>Vorlagen</div>
        <div class="tab-item" onclick="switchTab('history', this)"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"></path></svg></span>Liste</div>
    </div>

    <script>
        let shifts = JSON.parse(localStorage.getItem('myShifts')) || [];
        let presets = JSON.parse(localStorage.getItem('myPresets')) || [];
        let mChart = null, aChart = null;

        document.getElementById('shift-date').valueAsDate = new Date();
        updateMonthDropdowns();
        updateDashboard();
        renderPresets();

        function switchTab(t, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`tab-${t}`).classList.add('active');
            if(el) el.classList.add('active');
            if(t === 'dashboard') updateDashboard();
            if(t === 'history') renderHistory();
        }

        function toggleEntryMode() {
            const mode = document.getElementById('entry-mode').value;
            document.getElementById('normal-fields').style.display = mode === 'normal' ? 'block' : 'none';
            document.getElementById('pauschal-fields').style.display = mode === 'pauschal' ? 'block' : 'none';
            document.getElementById('preset-container').style.display = mode === 'normal' ? 'block' : 'none';
        }

        function editTip(id) {
            const shift = shifts.find(s => s.id === id);
            if(shift) {
                const newTip = prompt("Neues Trinkgeld (€):", shift.tip);
                if(newTip !== null) {
                    shift.tip = parseFloat(newTip) || 0;
                    localStorage.setItem('myShifts', JSON.stringify(shifts));
                    renderHistory();
                    updateDashboard();
                }
            }
        }

        function saveShift() {
            const mode = document.getElementById('entry-mode').value;
            const date = document.getElementById('shift-date').value;
            const tip = parseFloat(document.getElementById('shift-tip').value) || 0;
            if(!date) return;

            let newShift = { id: Date.now(), date, tip, hours: 0, wageEarned: 0, type: mode };

            if(mode === 'normal') {
                const st = document.getElementById('time-start').value, en = document.getElementById('time-end').value;
                const wg = parseFloat(document.getElementById('hourly-wage').value) || 0, br = parseFloat(document.getElementById('shift-break').value) || 0;
                if(!st || !en) return;
                let sD = new Date(`1970-01-01T${st}`), eD = new Date(`1970-01-01T${en}`);
                if(eD < sD) eD.setDate(eD.getDate() + 1);
                newShift.hours = (eD - sD) / 3600000 - (br/60);
                newShift.wageEarned = newShift.hours * wg;
            } else {
                newShift.wageEarned = parseFloat(document.getElementById('flat-amount').value) || 0;
            }

            shifts.push(newShift);
            localStorage.setItem('myShifts', JSON.stringify(shifts));
            document.getElementById('shift-tip').value = '';
            updateMonthDropdowns();
            switchTab('dashboard', document.querySelector('.tab-item'));
        }

        function savePreset() {
            const name = document.getElementById('p-name').value;
            if(!name) return;
            presets.push({ id: Date.now(), name, start: document.getElementById('p-start').value, end: document.getElementById('p-end').value, break: document.getElementById('p-break').value, wage: document.getElementById('p-wage').value });
            localStorage.setItem('myPresets', JSON.stringify(presets));
            renderPresets();
        }

        function renderPresets() {
            document.getElementById('preset-list').innerHTML = presets.map(p => `<div class="preset-item"><div><strong>${p.name}</strong><br><small>${p.start}-${p.end} | ${p.wage}€</small></div><span class="delete-link" onclick="deletePreset(${p.id})">Löschen</span></div>`).join('');
            document.getElementById('preset-select').innerHTML = '<option value="">-- Keine Vorlage --</option>' + presets.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        }

        function applyPreset() {
            const p = presets.find(x => x.id == document.getElementById('preset-select').value);
            if(p) { document.getElementById('time-start').value=p.start; document.getElementById('time-end').value=p.end; document.getElementById('shift-break').value=p.break; document.getElementById('hourly-wage').value=p.wage; }
        }

        function deletePreset(id) { presets = presets.filter(p => p.id !== id); localStorage.setItem('myPresets', JSON.stringify(presets)); renderPresets(); }

        function updateMonthDropdowns() {
            const months = [...new Set(shifts.map(s => s.date.substring(0, 7)))].sort().reverse();
            const dash = document.getElementById('dashboard-month-filter'), hist = document.getElementById('history-month-filter');
            let h = months.map(m => `<option value="${m}">${m}</option>`).join('');
            dash.innerHTML = h || `<option value="${new Date().toISOString().substring(0,7)}">${new Date().toISOString().substring(0,7)}</option>`;
            hist.innerHTML = '<option value="all">Alle Monate</option>' + h;
        }

        function updateDashboard() {
            const selM = document.getElementById('dashboard-month-filter').value;
            const mShifts = shifts.filter(s => s.date.startsWith(selM)).sort((a,b) => a.date.localeCompare(b.date));
            const mStats = mShifts.reduce((a, s) => { a.h += s.hours; a.w += s.wageEarned; a.t += s.tip; return a; }, {h:0, w:0, t:0});
            document.getElementById('m-hours').innerText = mStats.h.toFixed(2)+'h';
            document.getElementById('m-wage').innerText = mStats.w.toFixed(2)+'€';
            document.getElementById('m-tip').innerText = mStats.t.toFixed(2)+'€';
            document.getElementById('m-shifts').innerText = mShifts.length;
            const aStats = shifts.reduce((a, s) => { a.h += s.hours; a.w += s.wageEarned; a.t += s.tip; return a; }, {h:0, w:0, t:0});
            document.getElementById('a-hours').innerText = aStats.h.toFixed(2)+'h';
            document.getElementById('a-wage').innerText = aStats.w.toFixed(2)+'€';
            document.getElementById('a-tip').innerText = aStats.t.toFixed(2)+'€';
            document.getElementById('a-shifts').innerText = shifts.length;
            renderCharts(mShifts);
        }

        function renderCharts(mShifts) {
            const ctxM = document.getElementById('monthChart').getContext('2d');
            if(mChart) mChart.destroy();
            mChart = new Chart(ctxM, {
                type: 'bar',
                data: { labels: mShifts.map(s => s.date.split('-')[2]), datasets: [{ label: 'Verdienst (€)', data: mShifts.map(s => s.wageEarned+s.tip), backgroundColor: '#007AFF', borderRadius: 6 }] },
                options: { responsive: true, plugins: { title: { display: true, text: 'Tagesübersicht (€)' }, legend: { display: false } } }
            });
            const ctxA = document.getElementById('allTimeChart').getContext('2d');
            if(aChart) aChart.destroy();
            const grouped = shifts.reduce((acc, s) => { const m = s.date.substring(0, 7); acc[m] = (acc[m] || 0) + s.wageEarned + s.tip; return acc; }, {});
            const labels = Object.keys(grouped).sort();
            aChart = new Chart(ctxA, {
                type: 'bar',
                data: { labels: labels, datasets: [{ label: 'Monatssumme (€)', data: labels.map(l => grouped[l]), backgroundColor: ['#FF9500', '#34C759', '#AF52DE', '#007AFF'], borderRadius: 8 }] },
                options: { responsive: true, plugins: { title: { display: true, text: 'Monatsvergleich (€)' }, legend: { display: false } } }
            });
        }

        function renderHistory() {
            const f = document.getElementById('history-month-filter').value;
            const filtered = f === 'all' ? shifts : shifts.filter(s => s.date.startsWith(f));
            document.getElementById('history-list').innerHTML = filtered.sort((a,b) => b.id - a.id).map(s => `
                <div class="history-item">
                    <div><strong>${new Date(s.date).toLocaleDateString('de-DE', {weekday:'short', day:'2-digit'})}</strong><br><small>${s.type === 'pauschal' ? 'Event' : s.hours.toFixed(2)+'h'} | Tipp: ${s.tip}€</small></div>
                    <div style="text-align:right">
                        <strong>${(s.wageEarned+s.tip).toFixed(2)}€</strong><br>
                        <div class="action-links">
                            <span class="edit-link" onclick="editTip(${s.id})">Tipp ändern</span>
                            <span class="delete-link" onclick="deleteShift(${s.id})">Löschen</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function deleteShift(id) { if(confirm('Löschen?')) { shifts = shifts.filter(s => s.id !== id); localStorage.setItem('myShifts', JSON.stringify(shifts)); renderHistory(); updateDashboard(); } }
    </script>
</body>
</html>
