<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Arbeitsstunden App</title>

<script src="https://accounts.google.com/gsi/client"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:system-ui;
background:linear-gradient(135deg,#141414,#1f1f1f);
color:white;
margin:0;
padding:20px;
max-width:1100px;
margin:auto;
}

h1{text-align:center}

.card{
background:#1e1e1e;
padding:18px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

input,select{
padding:10px;
border:none;
border-radius:6px;
background:#2a2a2a;
color:white;
margin:5px;
}

button{
background:#ff3b3b;
border:none;
padding:10px 16px;
border-radius:8px;
color:white;
font-weight:bold;
cursor:pointer;
margin:5px;
}

button:hover{
background:#ff2020;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
}

.stat{
background:#222;
padding:15px;
border-radius:10px;
text-align:center;
}

.stat b{
font-size:22px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
text-align:center;
}

</style>

</head>

<body>

<h1>💼 Arbeitsstunden Tracker</h1>

<div class="card">

<label>Stundenlohn</label>
<input type="number" id="stundenlohn" value="1">

</div>

<div class="card">

<h3>➕ Neue Schicht</h3>

<input type="date" id="datum">
<input type="time" id="von">
<input type="time" id="bis">
<input type="number" id="pause" placeholder="Pause (min)">
<input type="number" id="tip" placeholder="Trinkgeld">

<button onclick="addShift()">Speichern</button>

</div>

<div class="card">

<h3>🎉 Event / Pauschal</h3>

<input type="date" id="eventDatum">
<input type="number" id="eventLohn" placeholder="Lohn">
<input type="number" id="eventTip" placeholder="Trinkgeld">

<button onclick="addEvent()">Event speichern</button>

</div>

<div class="stats">

<div class="stat">
Stunden<br>
<b id="stunden">0</b>
</div>

<div class="stat">
Gehalt<br>
<b id="lohn">0€</b>
</div>

<div class="stat">
Trinkgeld<br>
<b id="tips">0€</b>
</div>

<div class="stat">
Gesamt<br>
<b id="gesamt">0€</b>
</div>

</div>

<div class="card">

<h3>📋 Schichten</h3>

<table>

<thead>
<tr>
<th>Datum</th>
<th>Von</th>
<th>Bis</th>
<th>Pause</th>
<th>Std</th>
<th>Lohn</th>
<th>Tip</th>
<th></th>
</tr>
</thead>

<tbody id="liste"></tbody>

</table>

</div>

<div class="card">

<h3>☁️ Google Drive</h3>

<button onclick="googleLogin()">Google verbinden</button>
<button onclick="backup()">Backup speichern</button>
<button onclick="restore()">Backup laden</button>

</div>

<div class="card">

<h3>📊 Jahresverdienst</h3>
<canvas id="chart"></canvas>

</div>

<script>

const CLIENT_ID="707949991470-jh19ccg4joo8u5l27o3oogon40g2p83d.apps.googleusercontent.com"

let data=JSON.parse(localStorage.getItem("arbeitApp"))||{}
let chart
let token

function save(){
localStorage.setItem("arbeitApp",JSON.stringify(data))
}

function addShift(){

let datum=document.getElementById("datum").value
let von=document.getElementById("von").value
let bis=document.getElementById("bis").value
let pause=parseFloat(document.getElementById("pause").value)||0
let tip=parseFloat(document.getElementById("tip").value)||0
let lohnProStunde=parseFloat(document.getElementById("stundenlohn").value)||0

let start=new Date("1970-01-01T"+von)
let ende=new Date("1970-01-01T"+bis)

let stunden=(ende-start)/1000/60/60
stunden-=pause/60

let lohn=stunden*lohnProStunde

data[Date.now()]={datum,von,bis,pause,stunden,lohn,tip}

save()
render()

}

function addEvent(){

let datum=document.getElementById("eventDatum").value
let lohn=parseFloat(document.getElementById("eventLohn").value)||0
let tip=parseFloat(document.getElementById("eventTip").value)||0

data[Date.now()]={datum,von:"Event",bis:"-",pause:0,stunden:0,lohn,tip}

save()
render()

}

function deleteShift(id){

delete data[id]

save()
render()

}

function render(){

let liste=document.getElementById("liste")
liste.innerHTML=""

let totalStunden=0
let totalLohn=0
let totalTip=0

let stats=new Array(12).fill(0)

Object.entries(data).forEach(([id,s])=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${s.datum}</td>
<td>${s.von}</td>
<td>${s.bis}</td>
<td>${s.pause}</td>
<td>${s.stunden.toFixed(2)}</td>
<td>${s.lohn.toFixed(2)}€</td>
<td>${s.tip}€</td>
<td><button onclick="deleteShift('${id}')">X</button></td>
`

liste.appendChild(tr)

totalStunden+=s.stunden
totalLohn+=s.lohn
totalTip+=s.tip

let m=new Date(s.datum).getMonth()
stats[m]+=s.lohn+s.tip

})

stunden.innerText=totalStunden.toFixed(2)
lohn.innerText=totalLohn.toFixed(2)+"€"
tips.innerText=totalTip.toFixed(2)+"€"
gesamt.innerText=(totalLohn+totalTip).toFixed(2)+"€"

drawChart(stats)

}

function drawChart(stats){

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"],
datasets:[{label:"Verdienst €",data:stats}]
}
})

}

function googleLogin(){

google.accounts.oauth2.initTokenClient({
client_id:CLIENT_ID,
scope:"https://www.googleapis.com/auth/drive.file",
callback:(resp)=>{token=resp.access_token}
}).requestAccessToken()

}

function backup(){

fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=media",{
method:"POST",
headers:{
Authorization:"Bearer "+token,
"Content-Type":"application/json"
},
body:JSON.stringify(data)
})

alert("Backup gespeichert")

}

render()

</script>

</body>
</html>
