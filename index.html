<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Stundenheld">
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/PJtc4Nz0/icon-arbeit.png">
    
    <title>Stundenheld</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #000000;
            --text-muted: #8E8E93;
            --primary: #007AFF;
            --danger: #FF3B30;
            --border-color: rgba(60, 60, 67, 0.1);
            --tab-bar-bg: rgba(255, 255, 255, 0.75);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --safe-top: env(safe-area-inset-top, 47px);
            
            --box-blue-bg: rgba(0, 122, 255, 0.1);
            --box-blue-txt: #007AFF;
            --box-green-bg: rgba(52, 199, 89, 0.1);
            --box-green-txt: #34C759;
            --box-orange-bg: rgba(255, 149, 0, 0.1);
            --box-orange-txt: #FF9500;
            --box-purple-bg: rgba(175, 82, 222, 0.1);
            --box-purple-txt: #AF52DE;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --card-bg: #1C1C1E;
                --text-main: #FFFFFF;
                --text-muted: #98989D;
                --border-color: rgba(235, 235, 245, 0.15);
                --tab-bar-bg: rgba(28, 28, 30, 0.75);
                
                --box-blue-bg: rgba(10, 132, 255, 0.15);
                --box-blue-txt: #0A84FF;
                --box-green-bg: rgba(48, 209, 88, 0.15);
                --box-green-txt: #30D158;
                --box-orange-bg: rgba(255, 159, 10, 0.15);
                --box-orange-txt: #FF9F0A;
                --box-purple-bg: rgba(191, 90, 242, 0.15);
                --box-purple-txt: #BF5AF2;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: var(--safe-top);
            padding-bottom: calc(110px + var(--safe-bottom)); 
        }

        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 34px; font-weight: 800; margin-bottom: 20px; letter-spacing: -1px; }
        .section-title { font-size: 13px; text-transform: uppercase; color: var(--text-muted); font-weight: 700; letter-spacing: 0.5px; margin: 20px 0 10px 4px; }

        .alltime-card {
            background: linear-gradient(135deg, #007AFF, #5856D6);
            border-radius: 20px;
            padding: 24px;
            color: white;
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.2);
        }
        .alltime-card h2 { font-size: 14px; text-transform: uppercase; opacity: 0.9; margin-bottom: 8px; font-weight: 600; }
        .alltime-card p { font-size: 36px; font-weight: 800; }

        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 14px rgba(0,0,0,0.04); }

        select.ios-select {
            background-color: var(--card-bg);
            color: var(--primary);
            font-size: 17px;
            font-weight: 600;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            width: 100%;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23007AFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 16px top 50%;
            background-size: 12px auto;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .stat-box { padding: 16px; border-radius: 16px; background: var(--card-bg); }
        .stat-box h3 { font-size: 11px; text-transform: uppercase; margin-bottom: 4px; font-weight: 700; color: var(--text-muted); }
        .stat-box p { font-size: 20px; font-weight: 700; }
        
        .stat-box.orange p { color: var(--box-orange-txt); }
        .stat-box.blue p { color: var(--box-blue-txt); }
        .stat-box.green p { color: var(--box-green-txt); }
        .stat-box.purple p { color: var(--box-purple-txt); }

        .input-group { margin-bottom: 16px; display: flex; flex-direction: column; }
        label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; font-weight: 700; }
        input { width: 100%; padding: 14px; border: 1.5px solid var(--border-color); border-radius: 12px; font-size: 17px; background: transparent; color: var(--text-main); }
        .row { display: flex; gap: 12px; }

        button.primary-btn { background: linear-gradient(135deg, var(--primary), #0056D6); color: white; border: none; padding: 18px; border-radius: 16px; font-size: 18px; font-weight: 700; width: 100%; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3); }
        
        .tab-bar { position: fixed; bottom: calc(var(--safe-bottom) + 10px); left: 20px; right: 20px; background: var(--tab-bar-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-radius: 24px; display: flex; justify-content: space-around; padding: 8px 10px; z-index: 1000; border: 0.5px solid rgba(255, 255, 255, 0.2); }
        .tab-item { flex: 1; text-align: center; color: var(--text-muted); font-size: 11px; font-weight: 600; display: flex; flex-direction: column; align-items: center; }
        .tab-item.active { color: var(--primary); }
        .tab-icon svg { width: 24px; height: 24px; margin-bottom: 4px; stroke-width: 2.5; }

        .history-item-wrapper { position: relative; border-bottom: 1px solid var(--border-color); }
        .history-item-fg { background-color: var(--card-bg); display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; width: 100%; }
        .delete-btn { color: var(--danger); font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>

    <div id="tab-dashboard" class="tab-content active">
        <h1>Stundenheld</h1>
        
        <div class="alltime-card">
            <h2>Gesamtverdienst (All-Time)</h2>
            <p id="alltime-total">0,00 €</p>
        </div>

        <div class="section-title">Monatsübersicht</div>
        <select id="dashboard-month-filter" class="ios-select" onchange="updateDashboard()"></select>
        
        <div class="stats-grid">
            <div class="stat-box orange"><h3>Stunden</h3><p id="month-hours">0.00 h</p></div>
            <div class="stat-box blue"><h3>Lohn</h3><p id="month-wage">0 €</p></div>
            <div class="stat-box green"><h3>Trinkgeld</h3><p id="month-tip">0 €</p></div>
            <div class="stat-box purple"><h3>Schichten</h3><p id="month-shifts">0</p></div>
        </div>
        
        <div class="card" style="margin-top: 20px;"><canvas id="monthChart"></canvas></div>
        
        <div class="row" style="margin-top: 10px;">
            <button onclick="exportData()" style="flex:1; padding:12px; border-radius:12px; border:none; background:var(--box-blue-bg); color:var(--primary); font-weight:600;">Sichern</button>
            <button onclick="document.getElementById('file-input').click()" style="flex:1; padding:12px; border-radius:12px; border:none; background:var(--border-color); color:var(--text-main); font-weight:600;">Laden</button>
            <input type="file" id="file-input" style="display:none;" onchange="importData(event)">
        </div>
    </div>

    <div id="tab-add" class="tab-content">
        <h1>Eintragen</h1>
        <div class="card">
            <div class="input-group">
                <label>Typ</label>
                <select id="shift-type" class="ios-select" onchange="toggleShiftType()">
                    <option value="normal">Normale Schicht</option>
                    <option value="event">Event / Pauschal</option>
                </select>
            </div>
            <div class="input-group"><label>Datum</label><input type="date" id="shift-date"></div>
            <div id="normal-inputs">
                <div class="row">
                    <div class="input-group"><label>Start</label><input type="time" id="time-start"></div>
                    <div class="input-group"><label>Ende</label><input type="time" id="time-end"></div>
                </div>
                <div class="row">
                    <div class="input-group"><label>Pause (Min)</label><input type="number" id="shift-break" placeholder="30"></div>
                    <div class="input-group"><label>Lohn/Std</label><input type="number" id="hourly-wage" placeholder="13.50"></div>
                </div>
            </div>
            <div id="event-inputs" style="display: none;">
                <div class="input-group"><label>Pauschale (€)</label><input type="number" id="flat-wage" placeholder="150"></div>
            </div>
            <div class="input-group"><label>Trinkgeld (€)</label><input type="number" id="shift-tip" placeholder="0"></div>
            <button class="primary-btn" onclick="saveShift()">Schicht speichern</button>
        </div>
    </div>

    <div id="tab-history" class="tab-content">
        <h1>Verlauf</h1>
        <select id="history-month-filter" class="ios-select" onchange="renderHistory()"></select>
        <div class="card" id="history-list" style="padding:0; overflow:hidden;"></div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab('dashboard', this)">
            <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></span>
            Home
        </div>
        <div class="tab-item" onclick="switchTab('add', this)">
            <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg></span>
            Eintragen
        </div>
        <div class="tab-item" onclick="switchTab('history', this)">
            <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg></span>
            Verlauf
        </div>
    </div>

    <script>
        let shifts = JSON.parse(localStorage.getItem('myShifts')) || [];
        let monthChartInstance = null;

        document.getElementById('shift-date').valueAsDate = new Date();
        updateMonthDropdowns();
        updateDashboard();
        renderHistory();

        function switchTab(tabName, element) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            if(element) element.classList.add('active');
            if(tabName === 'dashboard') updateDashboard();
            if(tabName === 'history') renderHistory();
        }

        function toggleShiftType() {
            const type = document.getElementById('shift-type').value;
            document.getElementById('normal-inputs').style.display = type === 'normal' ? 'block' : 'none';
            document.getElementById('event-inputs').style.display = type === 'event' ? 'block' : 'none';
        }

        function saveShift() {
            const type = document.getElementById('shift-type').value;
            const date = document.getElementById('shift-date').value;
            const tip = parseFloat(document.getElementById('shift-tip').value) || 0;
            if(!date) return;

            let newShift = { id: Date.now(), type, date, tip, hours: 0, wageEarned: 0 };
            if(type === 'normal') {
                const sT = document.getElementById('time-start').value;
                const eT = document.getElementById('time-end').value;
                const w = parseFloat(document.getElementById('hourly-wage').value) || 0;
                const b = parseFloat(document.getElementById('shift-break').value) || 0;
                let sD = new Date(`1970-01-01T${sT}`);
                let eD = new Date(`1970-01-01T${eT}`);
                if(eD < sD) eD.setDate(eD.getDate() + 1);
                newShift.hours = (eD - sD) / 3600000 - (b/60);
                newShift.wageEarned = newShift.hours * w;
            } else {
                newShift.wageEarned = parseFloat(document.getElementById('flat-wage').value) || 0;
            }
            shifts.push(newShift);
            localStorage.setItem('myShifts', JSON.stringify(shifts));
            updateMonthDropdowns();
            switchTab('dashboard', document.querySelectorAll('.tab-item')[0]);
        }

        function updateMonthDropdowns() {
            const months = [...new Set(shifts.map(s => s.date.substring(0, 7)))].sort().reverse();
            const dash = document.getElementById('dashboard-month-filter');
            const hist = document.getElementById('history-month-filter');
            let html = months.map(m => `<option value="${m}">${m}</option>`).join('');
            dash.innerHTML = html || `<option value="${new Date().toISOString().substring(0,7)}">${new Date().toISOString().substring(0,7)}</option>`;
            hist.innerHTML = '<option value="all">Alle anzeigen</option>' + html;
        }

        function updateDashboard() {
            // All-Time
            const allTotal = shifts.reduce((sum, s) => sum + s.wageEarned + s.tip, 0);
            document.getElementById('alltime-total').innerText = allTotal.toLocaleString('de-DE', {style: 'currency', currency: 'EUR'});

            // Month
            const m = document.getElementById('dashboard-month-filter').value;
            const filtered = shifts.filter(s => s.date.startsWith(m));
            const stats = filtered.reduce((acc, s) => { acc.h += s.hours; acc.w += s.wageEarned; acc.t += s.tip; return acc; }, {h:0, w:0, t:0});
            
            document.getElementById('month-hours').innerText = stats.h.toFixed(2) + ' h';
            document.getElementById('month-wage').innerText = stats.w.toFixed(2) + ' €';
            document.getElementById('month-tip').innerText = stats.t.toFixed(2) + ' €';
            document.getElementById('month-shifts').innerText = filtered.length;
            renderChart(filtered);
        }

        function renderChart(data) {
            const ctx = document.getElementById('monthChart').getContext('2d');
            if(monthChartInstance) monthChartInstance.destroy();
            monthChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(s => s.date.split('-')[2]),
                    datasets: [{ label: 'Verdienst €', data: data.map(s => s.wageEarned + s.tip), backgroundColor: '#007AFF', borderRadius: 6 }]
                },
                options: { plugins: { legend: { display: false } } }
            });
        }

        function renderHistory() {
            const filter = document.getElementById('history-month-filter').value;
            const list = document.getElementById('history-list');
            const filtered = filter === 'all' ? shifts : shifts.filter(s => s.date.startsWith(filter));
            list.innerHTML = filtered.sort((a,b) => b.id - a.id).map(s => `
                <div class="history-item-wrapper">
                    <div class="history-item-fg">
                        <div>
                            <strong>${new Date(s.date).toLocaleDateString()}</strong><br>
                            <span style="font-size:12px; color:var(--text-muted)">${s.hours.toFixed(2)}h | Lohn: ${s.wageEarned.toFixed(2)}€ | Tipp: ${s.tip.toFixed(2)}€</span>
                        </div>
                        <div style="text-align:right">
                            <div style="font-weight:700">${(s.wageEarned+s.tip).toFixed(2)}€</div>
                            <div class="delete-btn" onclick="deleteShift(${s.id})">Löschen</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function deleteShift(id) {
            if(confirm('Eintrag löschen?')) {
                shifts = shifts.filter(s => s.id !== id);
                localStorage.setItem('myShifts', JSON.stringify(shifts));
                renderHistory();
                updateDashboard();
            }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(shifts)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'stundenheld_backup.json'; a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                shifts = JSON.parse(event.target.result);
                localStorage.setItem('myShifts', JSON.stringify(shifts));
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        }
    </script>
</body>
</html>
