<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Schicht Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #000000;
            --text-muted: #8E8E93;
            --primary: #007AFF;
            --danger: #FF3B30;
            --border-color: rgba(60, 60, 67, 0.1);
            --tab-bar-bg: rgba(255, 255, 255, 0.75);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --safe-top: env(safe-area-inset-top, 47px);
            
            --box-blue-bg: rgba(0, 122, 255, 0.1);
            --box-blue-txt: #007AFF;
            --box-green-bg: rgba(52, 199, 89, 0.1);
            --box-green-txt: #34C759;
            --box-orange-bg: rgba(255, 149, 0, 0.1);
            --box-orange-txt: #FF9500;
            --box-purple-bg: rgba(175, 82, 222, 0.1);
            --box-purple-txt: #AF52DE;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --card-bg: #1C1C1E;
                --text-main: #FFFFFF;
                --text-muted: #98989D;
                --border-color: rgba(235, 235, 245, 0.15);
                --tab-bar-bg: rgba(28, 28, 30, 0.75);
                
                --box-blue-bg: rgba(10, 132, 255, 0.15);
                --box-blue-txt: #0A84FF;
                --box-green-bg: rgba(48, 209, 88, 0.15);
                --box-green-txt: #30D158;
                --box-orange-bg: rgba(255, 159, 10, 0.15);
                --box-orange-txt: #FF9F0A;
                --box-purple-bg: rgba(191, 90, 242, 0.15);
                --box-purple-txt: #BF5AF2;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: var(--safe-top);
            padding-bottom: calc(110px + var(--safe-bottom)); 
        }

        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 { font-size: 34px; font-weight: 700; margin-bottom: 24px; letter-spacing: -0.5px; }
        .section-title { font-size: 14px; text-transform: uppercase; color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px; margin: 28px 0 12px 4px; }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.03);
        }

        /* Apple Wallet Style Card für die Abrechnung */
        .wallet-card {
            background: linear-gradient(135deg, #2C2C2E 0%, #1C1C1E 100%);
            color: #FFFFFF;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }
        
        /* Hellerer Dark Mode / Wallet Style anpassung */
        @media (prefers-color-scheme: dark) {
            .wallet-card { background: linear-gradient(135deg, #3A3A3C 0%, #2C2C2E 100%); }
        }

        .wallet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .wallet-header h2 { font-size: 20px; font-weight: 600; margin: 0; }
        
        select.month-select {
            background: rgba(255, 255, 255, 0.15); color: #FFFFFF;
            border: none; padding: 8px 12px; border-radius: 10px;
            font-size: 15px; font-weight: 600; outline: none; -webkit-appearance: none;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 0; }
        .stat-box { padding: 18px; border-radius: 16px; text-align: left; }
        
        .stat-box.wallet-style { background: rgba(255, 255, 255, 0.08); padding: 16px; }
        .stat-box.wallet-style h3 { color: rgba(255, 255, 255, 0.6); font-size: 12px; }
        .stat-box.wallet-style p { color: #FFFFFF; font-size: 22px; }
        .stat-box.wallet-style p.highlight { color: #34C759; }

        .stat-box.blue { background: var(--box-blue-bg); }
        .stat-box.green { background: var(--box-green-bg); }
        .stat-box.orange { background: var(--box-orange-bg); }
        .stat-box.purple { background: var(--box-purple-bg); }
        
        .stat-box h3 { font-size: 13px; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; opacity: 0.8; }
        .stat-box p { font-size: 24px; font-weight: 700; }
        
        .stat-box.blue h3, .stat-box.blue p { color: var(--box-blue-txt); }
        .stat-box.green h3, .stat-box.green p { color: var(--box-green-txt); }
        .stat-box.orange h3, .stat-box.orange p { color: var(--box-orange-txt); }
        .stat-box.purple h3, .stat-box.purple p { color: var(--box-purple-txt); }

        .input-group { margin-bottom: 16px; display: flex; flex-direction: column; }
        .input-group:last-child { margin-bottom: 0; }
        label { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; font-weight: 600; letter-spacing: 0.8px; }
        input, select { width: 100%; padding: 14px; border: 1.5px solid var(--border-color); border-radius: 12px; font-size: 17px; background: transparent; color: var(--text-main); appearance: none; -webkit-appearance: none; transition: border-color 0.2s; }
        input:focus, select:focus { outline: none; border-color: var(--primary); }
        .row { display: flex; gap: 12px; }
        .row > .input-group { flex: 1; }

        button.primary-btn { background: linear-gradient(135deg, var(--primary), #0056D6); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 17px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3); transition: transform 0.1s; }
        button.primary-btn:active { transform: scale(0.97); }
        button.small-btn { background-color: var(--border-color); color: var(--text-main); border: none; padding: 12px 14px; border-radius: 12px; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: background-color 0.2s; }
        button.small-btn:active { background-color: rgba(0,0,0,0.1); }
        button.danger-btn { color: var(--danger); background-color: rgba(255, 59, 48, 0.1); }

        .tab-bar { position: fixed; bottom: calc(var(--safe-bottom) + 10px); left: 20px; right: 20px; background: var(--tab-bar-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); border: 0.5px solid rgba(255, 255, 255, 0.2); display: flex; justify-content: space-around; align-items: center; padding: 8px 10px; z-index: 1000; }
        .tab-item { flex: 1; text-align: center; padding: 8px 0; color: var(--text-muted); font-size: 11px; font-weight: 600; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: color 0.2s; }
        .tab-item.active { color: var(--primary); }
        .tab-icon { margin-bottom: 4px; display: flex; align-items: center; justify-content: center; }
        .tab-icon svg { width: 26px; height: 26px; stroke-width: 2.2; }

        .history-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding: 16px 0; }
        .history-item:last-child { border-bottom: none; }
        .history-details p { font-size: 15px; margin-bottom: 4px; }
        .history-details .date { font-weight: 600; font-size: 18px; margin-bottom: 6px; }
        .history-actions { display: flex; gap: 10px; flex-direction: column; }
    </style>
</head>
<body>

    <div id="tab-dashboard" class="tab-content active">
        <h1>Übersicht</h1>
        
        <div class="wallet-card">
            <div class="wallet-header">
                <h2>Abrechnung</h2>
                <select id="dashboard-month-filter" class="month-select" onchange="updateDashboardStats()"></select>
            </div>
            
            <div class="stats-grid">
                <div class="stat-box wallet-style">
                    <h3>Stunden</h3>
                    <p id="month-hours">0.00 h</p>
                </div>
                <div class="stat-box wallet-style">
                    <h3>Lohn</h3>
                    <p id="month-wage">0 €</p>
                </div>
                <div class="stat-box wallet-style">
                    <h3>Trinkgeld</h3>
                    <p id="month-tip" class="highlight">0 €</p>
                </div>
                <div class="stat-box wallet-style">
                    <h3>Schichten</h3>
                    <p id="month-shifts">0</p>
                </div>
            </div>
        </div>

        <div class="section-title">Diagramm</div>
        <div class="card">
            <canvas id="earningsChart"></canvas>
        </div>

        <div class="section-title">Gesamt (All-Time)</div>
        <div class="stats-grid" style="margin-bottom: 24px;">
            <div class="stat-box blue">
                <h3>Gesamt Lohn</h3>
                <p id="total-wage">0 €</p>
            </div>
            <div class="stat-box green">
                <h3>Trinkgeld</h3>
                <p id="total-tip">0 €</p>
            </div>
            <div class="stat-box orange">
                <h3>Ø Std.-Lohn</h3>
                <p id="avg-hourly">0 €</p>
            </div>
            <div class="stat-box purple">
                <h3>Schichten</h3>
                <p id="total-shifts">0</p>
            </div>
        </div>

        <div class="section-title">Daten & Sicherheit</div>
        <div class="card row" style="padding: 16px;">
            <button class="small-btn" onclick="exportData()" style="flex: 1; background-color: var(--box-blue-bg); color: var(--box-blue-txt);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Sichern
            </button>
            <button class="small-btn" onclick="document.getElementById('file-input').click()" style="flex: 1;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                Laden
            </button>
            <input type="file" id="file-input" style="display:none;" accept=".json" onchange="importData(event)">
        </div>
        
        <div style="height: 20px;"></div>
    </div>

    <div id="tab-add" class="tab-content">
        <h1>Neue Schicht</h1>
        
        <div class="card">
            <div class="input-group">
                <label>Schicht-Art</label>
                <select id="shift-type" onchange="toggleShiftType()">
                    <option value="normal">Stundenlohn</option>
                    <option value="event">Event (Pauschal)</option>
                </select>
            </div>

            <div class="input-group">
                <label>Datum</label>
                <input type="date" id="shift-date">
            </div>

            <div id="normal-inputs">
                <div class="row">
                    <div class="input-group"><label>Von</label><input type="time" id="time-start"></div>
                    <div class="input-group"><label>Bis</label><input type="time" id="time-end"></div>
                </div>
                <div class="row">
                    <div class="input-group"><label>Pause (Min)</label><input type="number" id="shift-break" placeholder="z.B. 30" step="5"></div>
                    <div class="input-group"><label>Std.-Lohn (€)</label><input type="number" id="hourly-wage" placeholder="z.B. 13.50" step="0.5"></div>
                </div>
            </div>

            <div id="event-inputs" style="display: none;">
                <div class="input-group"><label>Pauschallohn (€)</label><input type="number" id="flat-wage" placeholder="z.B. 150" step="1"></div>
            </div>

            <div class="input-group"><label>Trinkgeld (€)</label><input type="number" id="shift-tip" placeholder="0" step="0.5"></div>

            <button class="primary-btn" onclick="saveShift()">Schicht speichern</button>
        </div>
    </div>

    <div id="tab-history" class="tab-content">
        <h1>Verlauf</h1>
        
        <div class="input-group" style="margin-bottom: 20px;">
            <select id="history-month-filter" onchange="renderHistory()" style="background-color: var(--card-bg); font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: none;"></select>
        </div>

        <div class="card" id="history-list"></div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab('dashboard', this)">
            <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg></span>
            Übersicht
        </div>
        <div class="tab-item" onclick="switchTab('add', this)">
            <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg></span>
            Eintragen
        </div>
        <div class="tab-item" onclick="switchTab('history', this)">
            <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></span>
            Verlauf
        </div>
    </div>

    <script>
        let shifts = JSON.parse(localStorage.getItem('myShifts')) || [];
        let myChart = null;

        document.getElementById('shift-date').valueAsDate = new Date();
        updateMonthDropdowns();
        updateDashboard();
        renderHistory();

        function switchTab(tabName, element) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(item => item.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            element.classList.add('active');
            
            if(tabName === 'dashboard') {
                updateMonthDropdowns();
                updateDashboard();
            }
            if(tabName === 'history') {
                updateMonthDropdowns();
                renderHistory();
            }
        }

        function toggleShiftType() {
            const type = document.getElementById('shift-type').value;
            document.getElementById('normal-inputs').style.display = type === 'normal' ? 'block' : 'none';
            document.getElementById('event-inputs').style.display = type === 'event' ? 'block' : 'none';
        }

        function saveShift() {
            const type = document.getElementById('shift-type').value;
            const date = document.getElementById('shift-date').value;
            let tip = parseFloat(document.getElementById('shift-tip').value) || 0;
            if(!date) return alert("Bitte Datum wählen!");

            let newShift = { id: Date.now(), type: type, date: date, tip: tip, wageEarned: 0, hours: 0, breakMins: 0 };

            if (type === 'normal') {
                const start = document.getElementById('time-start').value;
                const end = document.getElementById('time-end').value;
                const wage = parseFloat(document.getElementById('hourly-wage').value) || 0;
                const breakMins = parseFloat(document.getElementById('shift-break').value) || 0;
                if(!start || !end || wage <= 0) return alert("Bitte Zeiten und Lohn eingeben!");

                let startTime = new Date(`1970-01-01T${start}:00`);
                let endTime = new Date(`1970-01-01T${end}:00`);
                if(endTime < startTime) endTime.setDate(endTime.getDate() + 1);
                
                let totalHours = (endTime - startTime) / (1000 * 60 * 60);
                let netHours = totalHours - (breakMins / 60);
                if (netHours < 0) return alert("Die Pause kann nicht länger als die Schicht sein!");

                newShift.hours = netHours;
                newShift.breakMins = breakMins;
                newShift.wageEarned = netHours * wage;
                newShift.start = start;
                newShift.end = end;
                newShift.hourlyWage = wage;
            } else {
                const flatWage = parseFloat(document.getElementById('flat-wage').value) || 0;
                if(flatWage <= 0) return alert("Bitte Pauschallohn eingeben!");
                newShift.wageEarned = flatWage;
            }

            shifts.push(newShift);
            saveData();
            updateMonthDropdowns();
            
            const btn = document.querySelector('.primary-btn');
            const originalText = btn.innerText;
            btn.innerText = "✓ Gespeichert!";
            btn.style.background = "linear-gradient(135deg, #34C759, #28A745)";
            setTimeout(() => { btn.innerText = originalText; btn.style.background = "linear-gradient(135deg, var(--primary), #0056D6)"; }, 2000);
            
            document.getElementById('shift-tip').value = '';
            document.getElementById('time-start').value = '';
            document.getElementById('time-end').value = '';
            document.getElementById('shift-break').value = '';
        }

        function updateMonthDropdowns() {
            const dashFilter = document.getElementById('dashboard-month-filter');
            const histFilter = document.getElementById('history-month-filter');
            const currentDashValue = dashFilter.value;
            const currentHistValue = histFilter.value;
            
            const months = new Set();
            shifts.forEach(s => {
                const d = new Date(s.date);
                months.add(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
            });

            // Fallback falls noch gar keine Schichten da sind: Aktuellen Monat nehmen
            if(months.size === 0) {
                const now = new Date();
                months.add(`${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`);
            }

            let optionsHtmlDash = '';
            let optionsHtmlHist = '<option value="all">Alle Monate anzeigen</option>';

            const sortedMonths = Array.from(months).sort().reverse();
            sortedMonths.forEach(m => {
                const [year, month] = m.split('-');
                const date = new Date(year, month - 1);
                const label = `${date.toLocaleString('de-DE', { month: 'long' })} ${year}`;
                optionsHtmlDash += `<option value="${m}">${label}</option>`;
                optionsHtmlHist += `<option value="${m}">${label}</option>`;
            });

            dashFilter.innerHTML = optionsHtmlDash;
            histFilter.innerHTML = optionsHtmlHist;

            if (Array.from(dashFilter.options).some(opt => opt.value === currentDashValue)) dashFilter.value = currentDashValue;
            if (Array.from(histFilter.options).some(opt => opt.value === currentHistValue)) histFilter.value = currentHistValue;
        }

        // --- DASHBOARD UPDATE ---
        function updateDashboardStats() {
            const selectedMonth = document.getElementById('dashboard-month-filter').value;
            
            // Monats-Werte (für das obere Wallet-Feld)
            let mHours = 0, mWage = 0, mTip = 0, mShifts = 0;
            
            shifts.forEach(s => {
                const d = new Date(s.date);
                const m = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                
                if (m === selectedMonth) {
                    mHours += s.hours || 0; // Event-Schichten haben 0 hours
                    mWage += s.wageEarned;
                    mTip += s.tip;
                    mShifts++;
                }
            });

            document.getElementById('month-hours').innerText = mHours.toFixed(2) + ' h';
            document.getElementById('month-wage').innerText = mWage.toFixed(2) + ' €';
            document.getElementById('month-tip').innerText = mTip.toFixed(2) + ' €';
            document.getElementById('month-shifts').innerText = mShifts;
        }

        function updateDashboard() {
            // Erst Monats-Werte aktualisieren
            updateDashboardStats();

            // Dann All-Time-Werte (unten)
            let totalWage = 0, totalTip = 0, totalHours = 0;
            shifts.forEach(s => { totalWage += s.wageEarned; totalTip += s.tip; totalHours += s.hours; });

            document.getElementById('total-wage').innerText = totalWage.toFixed(2) + ' €';
            document.getElementById('total-tip').innerText = totalTip.toFixed(2) + ' €';
            document.getElementById('total-shifts').innerText = shifts.length;
            
            let totalEarned = totalWage + totalTip;
            let avgPerHour = totalHours > 0 ? (totalEarned / totalHours).toFixed(2) : 0;
            document.getElementById('avg-hourly').innerText = avgPerHour + ' €';

            renderChart();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            const filterValue = document.getElementById('history-month-filter').value;
            list.innerHTML = '';

            let filteredShifts = shifts;
            if (filterValue !== 'all') {
                filteredShifts = shifts.filter(s => {
                    const d = new Date(s.date);
                    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}` === filterValue;
                });
            }

            if(filteredShifts.length === 0) {
                list.innerHTML = '<p style="text-align:center; color: var(--text-muted); padding: 30px 10px;">Keine Schichten in diesem Zeitraum.</p>';
                return;
            }

            let sortedShifts = [...filteredShifts].sort((a,b) => new Date(b.date) - new Date(a.date));
            const editIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`;
            const trashIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;

            sortedShifts.forEach(shift => {
                let formattedDate = new Date(shift.date).toLocaleDateString('de-DE');
                let totalEarned = shift.wageEarned + shift.tip;
                let detailsHtml = shift.type === 'normal' 
                    ? `${shift.start} - ${shift.end} Uhr <span style="color:var(--text-muted); font-size: 13px;">(${shift.hours.toFixed(2)}h, ${shift.breakMins}m Pause)</span> <br> Lohn: ${shift.wageEarned.toFixed(2)}€`
                    : `Event (Pauschal) <br> Lohn: ${shift.wageEarned.toFixed(2)}€`;

                let item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <div class="history-details">
                        <div class="date">${formattedDate}</div>
                        <p style="font-size: 15px; line-height: 1.4; margin-bottom: 8px;">${detailsHtml}</p>
                        <p><strong>Trinkgeld:</strong> <span style="color:var(--box-green-txt);">${shift.tip.toFixed(2)} €</span></p>
                        <p style="color: var(--text-main); font-weight: 700; margin-top: 6px; font-size: 17px;">Gesamt: ${totalEarned.toFixed(2)} €</p>
                    </div>
                    <div class="history-actions">
                        <button class="small-btn" onclick="editTip(${shift.id})">${editIcon} Tipp</button>
                        <button class="small-btn danger-btn" onclick="deleteShift(${shift.id})">${trashIcon} Löschen</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function deleteShift(id) {
            if(confirm("Willst du diese Schicht wirklich löschen?")) {
                shifts = shifts.filter(s => s.id !== id);
                saveData();
                updateMonthDropdowns();
                renderHistory();
                updateDashboard();
            }
        }

        function editTip(id) {
            let shift = shifts.find(s => s.id === id);
            let newTip = prompt(`Neues Trinkgeld eingeben:`, shift.tip);
            if(newTip !== null && !isNaN(newTip) && newTip.trim() !== "") {
                shift.tip = parseFloat(newTip);
                saveData();
                renderHistory();
                updateDashboard();
            }
        }

        function exportData() {
            if(shifts.length === 0) return alert("Keine Daten vorhanden!");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(shifts));
            const a = document.createElement('a'); a.href = dataStr; a.download = "schichten_backup.json";
            document.body.appendChild(a); a.click(); a.remove();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        if(confirm("Warnung: Dies überschreibt deine aktuellen Daten. Fortfahren?")) {
                            shifts = imported; saveData(); updateMonthDropdowns(); updateDashboard(); renderHistory(); alert("Backup geladen! ✅");
                        }
                    }
                } catch (err) { alert("❌ Fehler beim Lesen."); }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function saveData() { localStorage.setItem('myShifts', JSON.stringify(shifts)); }

        function renderChart() {
            const monthlyData = {};
            shifts.forEach(shift => {
                const date = new Date(shift.date);
                const monthYear = `${date.toLocaleString('de-DE', { month: 'short' })} ${date.getFullYear()}`;
                if(!monthlyData[monthYear]) monthlyData[monthYear] = { wage: 0, tip: 0 };
                monthlyData[monthYear].wage += shift.wageEarned;
                monthlyData[monthYear].tip += shift.tip;
            });

            const labels = Object.keys(monthlyData).reverse();
            const wageData = labels.map(l => monthlyData[l].wage);
            const tipData = labels.map(l => monthlyData[l].tip);

            const ctx = document.getElementById('earningsChart').getContext('2d');
            const isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const chartTextColor = isDarkMode ? '#98989D' : '#8E8E93';

            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: labels, datasets: [ { label: 'Lohn (€)', data: wageData, backgroundColor: '#007AFF', borderRadius: 6 }, { label: 'Trinkgeld (€)', data: tipData, backgroundColor: '#34C759', borderRadius: 6 } ] },
                options: { responsive: true, scales: { x: { stacked: true, ticks: { color: chartTextColor }, grid: { display: false } }, y: { stacked: true, ticks: { color: chartTextColor }, grid: { color: isDarkMode ? '#38383A' : 'rgba(60, 60, 67, 0.1)' } } }, plugins: { legend: { position: 'bottom', labels: { color: chartTextColor, usePointStyle: true, boxWidth: 8 } } } }
            });
        }
    </script>
</body>
</html>
