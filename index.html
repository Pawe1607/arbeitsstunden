<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Arbeitsstunden</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,system-ui;
margin:0;
background:linear-gradient(160deg,#0f172a,#1e293b,#020617);
color:white;
min-height:100vh;
}

header{
text-align:center;
padding:20px;
font-size:22px;
font-weight:600;
}

.page{
display:none;
padding:16px;
padding-bottom:90px;
}

.page.active{
display:block;
}

.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(14px);
padding:18px;
border-radius:18px;
margin-bottom:16px;
border:1px solid rgba(255,255,255,0.08);
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.stat{
border-radius:18px;
padding:16px;
text-align:center;
}

.stat b{
font-size:24px;
}

.stat:nth-child(1){background:linear-gradient(135deg,#38bdf8,#2563eb);}
.stat:nth-child(2){background:linear-gradient(135deg,#34d399,#059669);}
.stat:nth-child(3){background:linear-gradient(135deg,#facc15,#f59e0b);}
.stat:nth-child(4){background:linear-gradient(135deg,#fb7185,#e11d48);}

label{
font-size:13px;
opacity:0.7;
display:block;
margin-bottom:4px;
}

input{
width:100%;
padding:13px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.08);
color:white;
font-size:16px;
margin-bottom:12px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:600;
background:linear-gradient(90deg,#6366f1,#8b5cf6);
color:white;
}

.month{
margin-bottom:20px;
}

.month h3{
opacity:0.8;
margin-bottom:10px;
}

.shift{
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:10px;
margin-bottom:6px;
font-size:14px;
display:flex;
justify-content:space-between;
align-items:center;
}

.deleteBtn{
background:#ef4444;
padding:6px 10px;
border-radius:8px;
font-size:12px;
border:none;
color:white;
}

.bottomnav{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(15,23,42,0.9);
display:flex;
border-top:1px solid rgba(255,255,255,0.1);
}

.navbtn{
flex:1;
text-align:center;
padding:10px;
font-size:13px;
}

#msg{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#22c55e;
padding:10px 18px;
border-radius:10px;
display:none;
}

canvas{
margin-top:20px;
}

</style>

</head>

<body>

<header>Arbeitsstunden</header>

<div id="msg">Schicht gespeichert ✔</div>

<!-- Stats -->

<div class="page active" id="stats">

<div class="stats">

<div class="stat">
Stunden<br>
<b id="stunden">0</b>
</div>

<div class="stat">
Gehalt<br>
<b id="lohn">0€</b>
</div>

<div class="stat">
Trinkgeld<br>
<b id="tips">0€</b>
</div>

<div class="stat">
Gesamt<br>
<b id="gesamt">0€</b>
</div>

</div>

<canvas id="chart"></canvas>

</div>

<!-- Schichten -->

<div class="page" id="shifts">
<div id="liste"></div>
</div>

<!-- Neue Schicht -->

<div class="page" id="add">

<div class="card">

<h3>Normale Schicht</h3>

<label>Datum</label>
<input type="date" id="datum">

<label>Von</label>
<input type="text" id="von" placeholder="17:30">

<label>Bis</label>
<input type="text" id="bis" placeholder="23:00">

<label>Pause Minuten</label>
<input type="number" id="pause">

<label>Trinkgeld €</label>
<input type="number" id="tip">

<label>Stundenlohn €</label>
<input type="number" id="lohnstunde" value="1">

<button onclick="addShift()">Schicht speichern</button>

</div>

<div class="card">

<h3>Event Schicht</h3>

<label>Datum</label>
<input type="date" id="eventDatum">

<label>Pauschal Lohn €</label>
<input type="number" id="eventLohn">

<label>Trinkgeld €</label>
<input type="number" id="eventTip">

<button onclick="addEvent()">Event speichern</button>

</div>

</div>

<!-- Navigation -->

<div class="bottomnav">

<div class="navbtn" onclick="openPage('stats')">📊<br>Stats</div>
<div class="navbtn" onclick="openPage('shifts')">📅<br>Schichten</div>
<div class="navbtn" onclick="openPage('add')">➕<br>Neu</div>

</div>

<script>

let data=JSON.parse(localStorage.getItem("arbeit"))||{}
let chart

function save(){
localStorage.setItem("arbeit",JSON.stringify(data))
}

function showMsg(){
let m=document.getElementById("msg")
m.style.display="block"
setTimeout(()=>m.style.display="none",2000)
}

function openPage(id){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

function addShift(){

let datum=document.getElementById("datum").value
let von=document.getElementById("von").value
let bis=document.getElementById("bis").value
let pause=parseFloat(document.getElementById("pause").value)||0
let tip=parseFloat(document.getElementById("tip").value)||0
let lohnstunde=parseFloat(document.getElementById("lohnstunde").value)||0

let start=new Date("1970-01-01T"+von)
let ende=new Date("1970-01-01T"+bis)

let stunden=(ende-start)/1000/60/60
stunden-=pause/60

let lohn=stunden*lohnstunde

let id=Date.now()

data[id]={datum,stunden,lohn,tip}

save()
render()
showMsg()

}

function addEvent(){

let datum=document.getElementById("eventDatum").value
let lohn=parseFloat(document.getElementById("eventLohn").value)||0
let tip=parseFloat(document.getElementById("eventTip").value)||0

let id=Date.now()

data[id]={datum,stunden:0,lohn,tip,event:true}

save()
render()
showMsg()

}

function deleteShift(id){

delete data[id]

save()
render()

}

function render(){

let liste=document.getElementById("liste")
liste.innerHTML=""

let months={}
let totalH=0
let totalL=0
let totalT=0

Object.entries(data).forEach(([id,s])=>{

let m=s.datum.slice(0,7)

if(!months[m]) months[m]=[]

months[m].push({id:id,...s})

})

Object.entries(months).sort().reverse().forEach(([m,arr])=>{

let div=document.createElement("div")
div.className="month"
div.innerHTML="<h3>"+m+"</h3>"

arr.forEach(s=>{

let row=document.createElement("div")
row.className="shift"

row.innerHTML=`
<div>
${s.datum} |
${s.stunden.toFixed(2)}h |
${s.lohn.toFixed(2)}€ |
Tip ${s.tip}€
</div>

<button class="deleteBtn" onclick="deleteShift('${s.id}')">Löschen</button>
`

div.appendChild(row)

totalH+=s.stunden
totalL+=s.lohn
totalT+=s.tip

})

liste.appendChild(div)

})

document.getElementById("stunden").innerText=totalH.toFixed(2)
document.getElementById("lohn").innerText=totalL.toFixed(2)+"€"
document.getElementById("tips").innerText=totalT.toFixed(2)+"€"
document.getElementById("gesamt").innerText=(totalL+totalT).toFixed(2)+"€"

drawChart(totalL,totalT)

}

function drawChart(lohn,tip){

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{

type:"doughnut",

data:{
labels:["Gehalt","Trinkgeld"],
datasets:[{
data:[lohn,tip]
}]
}

})

}

render()

</script>

</body>
</html>
