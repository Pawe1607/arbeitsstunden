<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arbeitsstunden</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont;
background:#121212;
color:white;
margin:0;
padding:15px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.card{
background:#1e1e1e;
border-radius:14px;
padding:15px;
margin-bottom:15px;
}

.inputs{
display:flex;
flex-direction:column;
gap:10px;
}

input{
padding:14px;
border:none;
border-radius:10px;
background:#2a2a2a;
color:white;
font-size:16px;
}

button{
padding:15px;
border:none;
border-radius:12px;
background:#ff3b3b;
color:white;
font-size:16px;
font-weight:bold;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
}

.stat{
background:#1e1e1e;
padding:12px;
border-radius:12px;
text-align:center;
}

.stat b{
font-size:20px;
}

.shift{
background:#1e1e1e;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

.shift-top{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:6px;
}

.delete{
background:#333;
padding:6px 10px;
border-radius:8px;
font-size:14px;
}

</style>

</head>

<body>

<h1>💼 Arbeitsstunden</h1>

<div class="card">

<div class="inputs">

<input type="number" id="stundenlohn" placeholder="Stundenlohn (€)" value="1">

</div>

</div>

<div class="card">

<h3>Neue Schicht</h3>

<div class="inputs">

<input type="date" id="datum">
<input type="time" id="von">
<input type="time" id="bis">
<input type="number" id="pause" placeholder="Pause Minuten">
<input type="number" id="tip" placeholder="Trinkgeld €">

<button onclick="addShift()">Schicht speichern</button>

</div>

</div>

<div class="stats">

<div class="stat">
Stunden<br>
<b id="stunden">0</b>
</div>

<div class="stat">
Gehalt<br>
<b id="lohn">0€</b>
</div>

<div class="stat">
Tip<br>
<b id="tips">0€</b>
</div>

<div class="stat">
Gesamt<br>
<b id="gesamt">0€</b>
</div>

</div>

<div id="liste"></div>

<script>

let data=JSON.parse(localStorage.getItem("arbeitApp"))||{}

function save(){
localStorage.setItem("arbeitApp",JSON.stringify(data))
}

function addShift(){

let datum=document.getElementById("datum").value
let von=document.getElementById("von").value
let bis=document.getElementById("bis").value
let pause=parseFloat(document.getElementById("pause").value)||0
let tip=parseFloat(document.getElementById("tip").value)||0
let lohnProStunde=parseFloat(document.getElementById("stundenlohn").value)||0

let start=new Date("1970-01-01T"+von)
let ende=new Date("1970-01-01T"+bis)

let stunden=(ende-start)/1000/60/60
stunden-=pause/60

let lohn=stunden*lohnProStunde

data[Date.now()]={datum,von,bis,pause,stunden,lohn,tip}

save()
render()

}

function deleteShift(id){

delete data[id]

save()
render()

}

function render(){

let liste=document.getElementById("liste")
liste.innerHTML=""

let totalStunden=0
let totalLohn=0
let totalTip=0

Object.entries(data).forEach(([id,s])=>{

let div=document.createElement("div")
div.className="shift"

div.innerHTML=`

<div class="shift-top">
${s.datum}
<button class="delete" onclick="deleteShift('${id}')">X</button>
</div>

<div>
${s.von} - ${s.bis}<br>
${s.stunden.toFixed(2)} Stunden
</div>

<div>
Lohn: ${s.lohn.toFixed(2)}€<br>
Tip: ${s.tip}€
</div>

`

liste.appendChild(div)

totalStunden+=s.stunden
totalLohn+=s.lohn
totalTip+=s.tip

})

document.getElementById("stunden").innerText=totalStunden.toFixed(2)
document.getElementById("lohn").innerText=totalLohn.toFixed(2)+"€"
document.getElementById("tips").innerText=totalTip.toFixed(2)+"€"
document.getElementById("gesamt").innerText=(totalLohn+totalTip).toFixed(2)+"€"

}

render()

</script>

</body>
</html>
