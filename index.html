<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Schichten">
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/PJtc4Nz0/icon-arbeit.png">
    
    <title>Schicht Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #000000;
            --text-muted: #8E8E93;
            --primary: #007AFF;
            --danger: #FF3B30;
            --border-color: rgba(60, 60, 67, 0.1);
            --tab-bar-bg: rgba(255, 255, 255, 0.75);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --safe-top: env(safe-area-inset-top, 47px);
            
            --box-blue-bg: rgba(0, 122, 255, 0.1);
            --box-blue-txt: #007AFF;
            --box-green-bg: rgba(52, 199, 89, 0.1);
            --box-green-txt: #34C759;
            --box-orange-bg: rgba(255, 149, 0, 0.1);
            --box-orange-txt: #FF9500;
            --box-purple-bg: rgba(175, 82, 222, 0.1);
            --box-purple-txt: #AF52DE;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --card-bg: #1C1C1E;
                --text-main: #FFFFFF;
                --text-muted: #98989D;
                --border-color: rgba(235, 235, 245, 0.15);
                --tab-bar-bg: rgba(28, 28, 30, 0.75);
                
                --box-blue-bg: rgba(10, 132, 255, 0.15);
                --box-blue-txt: #0A84FF;
                --box-green-bg: rgba(48, 209, 88, 0.15);
                --box-green-txt: #30D158;
                --box-orange-bg: rgba(255, 159, 10, 0.15);
                --box-orange-txt: #FF9F0A;
                --box-purple-bg: rgba(191, 90, 242, 0.15);
                --box-purple-txt: #BF5AF2;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: var(--safe-top);
            padding-bottom: calc(110px + var(--safe-bottom)); 
            overflow-x: hidden;
        }

        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 { font-size: 32px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.5px; }
        h2 { font-size: 24px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.3px; }
        .section-title { font-size: 14px; text-transform: uppercase; color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px; margin: 0 0 12px 4px; }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.04);
        }

        #history-list { padding: 0; overflow: hidden; }

        select.ios-select {
            background-color: var(--card-bg);
            color: var(--primary);
            font-size: 17px;
            font-weight: 600;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            width: 100%;
            margin-bottom: 20px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.03);
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23007AFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 16px top 50%;
            background-size: 12px auto;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
        .stat-box { padding: 18px; border-radius: 16px; text-align: left; background: var(--card-bg); box-shadow: 0 4px 14px rgba(0,0,0,0.03); }
        .stat-box.blue { background: var(--box-blue-bg); }
        .stat-box.green { background: var(--box-green-bg); }
        .stat-box.orange { background: var(--box-orange-bg); }
        .stat-box.purple { background: var(--box-purple-bg); }
        
        .stat-box h3 { font-size: 13px; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; opacity: 0.8; }
        .stat-box p { font-size: 24px; font-weight: 700; }
        .stat-box.blue p { color: var(--box-blue-txt); }
        .stat-box.green p { color: var(--box-green-txt); }
        .stat-box.orange p { color: var(--box-orange-txt); }
        .stat-box.purple p { color: var(--box-purple-txt); }

        .input-group { margin-bottom: 16px; display: flex; flex-direction: column; }
        label { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; font-weight: 600; letter-spacing: 0.8px; }
        input { width: 100%; padding: 14px; border: 1.5px solid var(--border-color); border-radius: 12px; font-size: 17px; background: transparent; color: var(--text-main); }
        .row { display: flex; gap: 12px; }
        .row > .input-group { flex: 1; }

        button.primary-btn { background: linear-gradient(135deg, var(--primary), #0056D6); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 17px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3); }
        button.small-btn { background-color: var(--border-color); color: var(--primary); border: none; padding: 10px 14px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }

        /* TAB BAR */
        .tab-bar { position: fixed; bottom: calc(var(--safe-bottom) + 10px); left: 20px; right: 20px; background: var(--tab-bar-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); border: 0.5px solid rgba(255, 255, 255, 0.2); display: flex; justify-content: space-around; align-items: center; padding: 8px 10px; z-index: 1000; }
        .tab-item { flex: 1; text-align: center; padding: 8px 0; color: var(--text-muted); font-size: 11px; font-weight: 600; display: flex; flex-direction: column; align-items: center; }
        .tab-item.active { color: var(--primary); }
        .tab-icon svg { width: 26px; height: 26px; stroke-width: 2.2; margin-bottom: 4px; }

        /* SWIPE LOGIK */
        .history-item-wrapper { position: relative; border-bottom: 1px solid var(--border-color); overflow: hidden; background: var(--card-bg); }
        .history-action-bg { position: absolute; top: 0; right: 0; bottom: 0; width: 90px; background-color: var(--danger); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 15px; z-index: 0; }
        .history-item-fg { position: relative; background-color: var(--card-bg); z-index: 1; display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1); width: 100%; }
    </style>
</head>
<body>

    <div id="tab-dashboard" class="tab-content active">
        <h1>Übersicht</h1>
        <select id="dashboard-month-filter" class="ios-select" onchange="updateDashboardStats()"></select>
        <div class="stats-grid">
            <div class="stat-box orange"><h3>Stunden</h3><p id="month-hours">0.00 h</p></div>
            <div class="stat-box blue"><h3>Lohn</h3><p id="month-wage">0 €</p></div>
            <div class="stat-box green"><h3>Trinkgeld</h3><p id="month-tip">0 €</p></div>
            <div class="stat-box purple"><h3>Schichten</h3><p id="month-shifts">0</p></div>
        </div>
        <div class="card"><canvas id="monthChart"></canvas></div>
        <div class="card row">
            <button class="small-btn" onclick="exportData()" style="flex: 1; background: var(--box-blue-bg);">Backup Sichern</button>
            <button class="small-btn" onclick="document.getElementById('file-input').click()" style="flex: 1;">Backup Laden</button>
            <input type="file" id="file-input" style="display:none;" onchange="importData(event)">
        </div>
    </div>

    <div id="tab-add" class="tab-content">
        <h1>Eintragen</h1>
        <div class="card">
            <div class="input-group">
                <label>Schicht-Art</label>
                <select id="shift-type" class="ios-select" onchange="toggleShiftType()">
                    <option value="normal">Reguläre Schicht</option>
                    <option value="event">Pauschale / Event</option>
                </select>
            </div>
            <div class="input-group"><label>Datum</label><input type="date" id="shift-date"></div>
            <div id="normal-inputs">
                <div class="row">
                    <div class="input-group"><label>Start</label><input type="time" id="time-start"></div>
                    <div class="input-group"><label>Ende</label><input type="time" id="time-end"></div>
                </div>
                <div class="row">
                    <div class="input-group"><label>Pause (Min)</label><input type="number" id="shift-break" placeholder="30"></div>
                    <div class="input-group"><label>Lohn/Std</label><input type="number" id="hourly-wage" placeholder="13.50"></div>
                </div>
            </div>
            <div id="event-inputs" style="display: none;">
                <div class="input-group"><label>Pauschale (€)</label><input type="number" id="flat-wage" placeholder="150"></div>
            </div>
            <div class="input-group"><label>Trinkgeld (€)</label><input type="number" id="shift-tip" placeholder="0"></div>
            <button class="primary-btn" onclick="saveShift()">Speichern</button>
        </div>
    </div>

    <div id="tab-history" class="tab-content">
        <h1>Verlauf</h1>
        <select id="history-month-filter" class="ios-select" onchange="renderHistory()"></select>
        <div class="card" id="history-list"></div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab('dashboard', this)">
            <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg></span>
            Übersicht
        </div>
        <div class="tab-item" onclick="switchTab('add', this)">
            <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg></span>
            Eintragen
        </div>
        <div class="tab-item" onclick="switchTab('history', this)">
            <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></span>
            Verlauf
        </div>
    </div>

    <script>
        let shifts = JSON.parse(localStorage.getItem('myShifts')) || [];
        let monthChartInstance = null;

        // Init
        document.getElementById('shift-date').valueAsDate = new Date();
        updateMonthDropdowns();
        updateDashboard();
        renderHistory();

        function switchTab(tabName, element) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            
            if(!element) {
                const names = ['dashboard', 'add', 'history'];
                element = document.querySelectorAll('.tab-item')[names.indexOf(tabName)];
            }
            element.classList.add('active');
            if(tabName === 'dashboard') updateDashboard();
            if(tabName === 'history') renderHistory();
        }

        // SWIPE LOGIK
        let startX = 0, startY = 0;
        document.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, {passive: true});

        document.addEventListener('touchend', e => {
            const diffX = startX - e.changedTouches[0].clientX;
            const diffY = startY - e.changedTouches[0].clientY;
            if (Math.abs(diffX) > 70 && Math.abs(diffX) > Math.abs(diffY) * 2) {
                const tabs = ['dashboard', 'add', 'history'];
                const current = document.querySelector('.tab-content.active').id.replace('tab-', '');
                let idx = tabs.indexOf(current);
                if (diffX > 0 && idx < 2) switchTab(tabs[idx+1]);
                else if (diffX < 0 && idx > 0) switchTab(tabs[idx-1]);
            }
        }, {passive: true});

        // FUNKTIONEN
        function toggleShiftType() {
            const type = document.getElementById('shift-type').value;
            document.getElementById('normal-inputs').style.display = type === 'normal' ? 'block' : 'none';
            document.getElementById('event-inputs').style.display = type === 'event' ? 'block' : 'none';
        }

        function saveShift() {
            const type = document.getElementById('shift-type').value;
            const date = document.getElementById('shift-date').value;
            const tip = parseFloat(document.getElementById('shift-tip').value) || 0;
            if(!date) return;

            let newShift = { id: Date.now(), type, date, tip, hours: 0, wageEarned: 0 };
            if(type === 'normal') {
                const start = document.getElementById('time-start').value;
                const end = document.getElementById('time-end').value;
                const wage = parseFloat(document.getElementById('hourly-wage').value) || 0;
                const brk = parseFloat(document.getElementById('shift-break').value) || 0;
                let s = new Date(`1970-01-01T${start}`);
                let e = new Date(`1970-01-01T${end}`);
                if(e < s) e.setDate(e.getDate() + 1);
                newShift.hours = (e - s) / 3600000 - (brk/60);
                newShift.wageEarned = newShift.hours * wage;
                newShift.start = start; newShift.end = end;
            } else {
                newShift.wageEarned = parseFloat(document.getElementById('flat-wage').value) || 0;
            }
            shifts.push(newShift);
            localStorage.setItem('myShifts', JSON.stringify(shifts));
            updateMonthDropdowns();
            switchTab('dashboard');
        }

        function updateMonthDropdowns() {
            const months = [...new Set(shifts.map(s => s.date.substring(0, 7)))].sort().reverse();
            const dash = document.getElementById('dashboard-month-filter');
            const hist = document.getElementById('history-month-filter');
            let html = months.map(m => `<option value="${m}">${m}</option>`).join('');
            dash.innerHTML = html || `<option value="${new Date().toISOString().substring(0,7)}">${new Date().toISOString().substring(0,7)}</option>`;
            hist.innerHTML = '<option value="all">Gesamter Verlauf</option>' + html;
        }

        function updateDashboard() {
            const m = document.getElementById('dashboard-month-filter').value;
            const filtered = shifts.filter(s => s.date.startsWith(m));
            const stats = filtered.reduce((acc, s) => {
                acc.h += s.hours; acc.w += s.wageEarned; acc.t += s.tip; return acc;
            }, {h:0, w:0, t:0});
            
            document.getElementById('month-hours').innerText = stats.h.toFixed(2) + ' h';
            document.getElementById('month-wage').innerText = stats.w.toFixed(2) + ' €';
            document.getElementById('month-tip').innerText = stats.t.toFixed(2) + ' €';
            document.getElementById('month-shifts').innerText = filtered.length;
            renderChart(filtered);
        }

        function renderChart(data) {
            const ctx = document.getElementById('monthChart').getContext('2d');
            if(monthChartInstance) monthChartInstance.destroy();
            const labels = data.map(s => s.date.split('-')[2]);
            monthChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{ label: 'Lohn + Tipp', data: data.map(s => s.wageEarned + s.tip), backgroundColor: '#007AFF', borderRadius: 5 }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });
        }

        function renderHistory() {
            const filter = document.getElementById('history-month-filter').value;
            const list = document.getElementById('history-list');
            const filtered = filter === 'all' ? shifts : shifts.filter(s => s.date.startsWith(filter));
            list.innerHTML = filtered.sort((a,b) => b.id - a.id).map(s => `
                <div class="history-item-wrapper">
                    <div class="history-action-bg" onclick="deleteShift(${s.id})">Löschen</div>
                    <div class="history-item-fg" ontouchstart="this.style.transform='translateX(-90px)'" ontouchend="setTimeout(()=>this.style.transform='translateX(0)', 3000)">
                        <div>
                            <strong>${new Date(s.date).toLocaleDateString()}</strong><br>
                            <span style="font-size:13px; color:var(--text-muted)">${s.hours.toFixed(2)}h | Lohn: ${s.wageEarned.toFixed(2)}€ | Tipp: ${s.tip.toFixed(2)}€</span>
                        </div>
                        <div style="font-weight:700">${(s.wageEarned + s.tip).toFixed(2)}€</div>
                    </div>
                </div>
            `).join('');
        }

        function deleteShift(id) {
            if(confirm('Löschen?')) {
                shifts = shifts.filter(s => s.id !== id);
                localStorage.setItem('myShifts', JSON.stringify(shifts));
                renderHistory();
            }
        }

        function exportData() {
            const data = JSON.stringify(shifts);
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'schicht_backup.json'; a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                shifts = JSON.parse(event.target.result);
                localStorage.setItem('myShifts', JSON.stringify(shifts));
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        }
    </script>
</body>
</html>
