<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Arbeitsstunden</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont;
margin:0;
background:#f2f4f7;
color:#111;
}

header{
text-align:center;
padding:15px;
font-weight:600;
font-size:20px;
background:white;
border-bottom:1px solid #ddd;
}

.page{
display:none;
padding:15px;
}

.page.active{
display:block;
}

.card{
background:white;
padding:15px;
border-radius:14px;
margin-bottom:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

label{
font-size:13px;
color:#666;
display:block;
margin-bottom:4px;
}

input{
width:100%;
padding:11px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#111;
color:white;
font-size:15px;
font-weight:600;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.stat{
background:white;
padding:12px;
border-radius:10px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.stat b{
font-size:20px;
}

.month{
margin-bottom:20px;
}

.month h3{
margin-bottom:8px;
}

.shift{
padding:8px 0;
border-bottom:1px solid #eee;
}

.bottomnav{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
background:white;
border-top:1px solid #ddd;
}

.navbtn{
flex:1;
text-align:center;
padding:10px;
font-size:14px;
}

canvas{
margin-top:20px;
}

</style>
</head>

<body>

<header>Arbeitsstunden</header>

<!-- Statistik -->

<div class="page active" id="stats">

<div class="stats">

<div class="stat">
Stunden<br>
<b id="stunden">0</b>
</div>

<div class="stat">
Gehalt<br>
<b id="lohn">0€</b>
</div>

<div class="stat">
Trinkgeld<br>
<b id="tips">0€</b>
</div>

<div class="stat">
Gesamt<br>
<b id="gesamt">0€</b>
</div>

</div>

<canvas id="chart"></canvas>

</div>

<!-- Schichten -->

<div class="page" id="shifts">

<div id="liste"></div>

</div>

<!-- Neue Schicht -->

<div class="page" id="add">

<div class="card">

<label>Datum</label>
<input type="date" id="datum">

<label>Von (z.B. 17:30)</label>
<input type="text" id="von">

<label>Bis</label>
<input type="text" id="bis">

<label>Pause Minuten</label>
<input type="number" id="pause">

<label>Trinkgeld €</label>
<input type="number" id="tip">

<label>Stundenlohn €</label>
<input type="number" id="lohnstunde" value="1">

<button onclick="addShift()">Normale Schicht speichern</button>

</div>

<div class="card">

<h3>Event Schicht</h3>

<label>Datum</label>
<input type="date" id="eventDatum">

<label>Pauschal Lohn €</label>
<input type="number" id="eventLohn">

<label>Trinkgeld €</label>
<input type="number" id="eventTip">

<button onclick="addEvent()">Event speichern</button>

</div>

</div>

<!-- Navigation -->

<div class="bottomnav">

<div class="navbtn" onclick="openPage('stats')">📊<br>Stats</div>

<div class="navbtn" onclick="openPage('shifts')">📅<br>Schichten</div>

<div class="navbtn" onclick="openPage('add')">➕<br>Neu</div>

</div>

<script>

let data=JSON.parse(localStorage.getItem("arbeit"))||{}

function save(){
localStorage.setItem("arbeit",JSON.stringify(data))
}

function openPage(id){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

function addShift(){

let datum=document.getElementById("datum").value
let von=document.getElementById("von").value
let bis=document.getElementById("bis").value
let pause=parseFloat(document.getElementById("pause").value)||0
let tip=parseFloat(document.getElementById("tip").value)||0
let lohnstunde=parseFloat(document.getElementById("lohnstunde").value)||0

let start=new Date("1970-01-01T"+von)
let ende=new Date("1970-01-01T"+bis)

let stunden=(ende-start)/1000/60/60
stunden-=pause/60

let lohn=stunden*lohnstunde

data[Date.now()]={datum,stunden,lohn,tip}

save()
render()

}

function addEvent(){

let datum=document.getElementById("eventDatum").value
let lohn=parseFloat(document.getElementById("eventLohn").value)||0
let tip=parseFloat(document.getElementById("eventTip").value)||0

data[Date.now()]={datum,stunden:0,lohn,tip,event:true}

save()
render()

}

function render(){

let liste=document.getElementById("liste")
liste.innerHTML=""

let months={}

let totalH=0
let totalL=0
let totalT=0

Object.values(data).forEach(s=>{

let m=s.datum.slice(0,7)

if(!months[m]) months[m]=[]

months[m].push(s)

})

Object.entries(months).sort().reverse().forEach(([m,arr])=>{

let div=document.createElement("div")

div.className="month"

div.innerHTML="<h3>"+m+"</h3>"

arr.forEach(s=>{

let row=document.createElement("div")

row.className="shift"

row.innerHTML=`
${s.datum} |
${s.stunden.toFixed(2)}h |
Lohn ${s.lohn.toFixed(2)}€ |
Tip ${s.tip}€
`

div.appendChild(row)

totalH+=s.stunden
totalL+=s.lohn
totalT+=s.tip

})

liste.appendChild(div)

})

document.getElementById("stunden").innerText=totalH.toFixed(2)
document.getElementById("lohn").innerText=totalL.toFixed(2)+"€"
document.getElementById("tips").innerText=totalT.toFixed(2)+"€"
document.getElementById("gesamt").innerText=(totalL+totalT).toFixed(2)+"€"

drawChart(totalH,totalL,totalT)

}

function drawChart(h,l,t){

new Chart(document.getElementById("chart"),{
type:"doughnut",
data:{
labels:["Stunden","Lohn","Trinkgeld"],
datasets:[{
data:[h,l,t]
}]
}
})

}

render()

</script>

</body>
</html>
